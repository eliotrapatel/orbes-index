<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBES</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #ffffff;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  cursor: none;
}

#bg {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
  background: #ffffff;
  transition: background 1800ms ease, opacity 0.8s ease;
  opacity: 0;
}
body.orbs-visible #bg { opacity: 1; }
body.chromatic #bg { opacity: 1; }  /* always visible in chromatic */

#cursor {
  position: fixed; top: 0; left: 0;
  width: 5px; height: 5px;
  background: #000; border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
}

.grain {
  position: fixed; inset: -200%;
  width: 400%; height: 400%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.022; pointer-events: none; z-index: 1;
  animation: grain 9s steps(1) infinite;
}
@keyframes grain {
  0%  { transform:translate(0,0) }      10% { transform:translate(-4%,-9%) }
  20% { transform:translate(-14%,4%) }  30% { transform:translate(6%,-14%) }
  40% { transform:translate(-4%,18%) }  50% { transform:translate(-18%,9%) }
  60% { transform:translate(13%,4%) }   70% { transform:translate(0,13%) }
  80% { transform:translate(2%,32%) }   90% { transform:translate(-18%,9%) }
 100% { transform:translate(0,0) }
}



.corner {
  position: fixed; width: 14px; height: 14px; z-index: 10;
  opacity: 0; animation: fade 0.7s ease 0.9s forwards;
  background: transparent; pointer-events: none;
}
/* Each corner: only the two border lines visible, interior fully transparent.
   We draw the lines via ::before (horizontal) and ::after (vertical) as 1px strips. */
.corner--tl { top:26px; left:30px; }
.corner--tl::before { content:''; position:absolute; top:0; left:0; width:100%; height:1px; background:#000; }
.corner--tl::after  { content:''; position:absolute; top:0; left:0; width:1px;  height:100%; background:#000; }

.corner--tr { top:26px; right:30px; }
.corner--tr::before { content:''; position:absolute; top:0; right:0; width:100%; height:1px; background:#000; }
.corner--tr::after  { content:''; position:absolute; top:0; right:0; width:1px;  height:100%; background:#000; }

.corner--bl { bottom:26px; left:30px; }
.corner--bl::before { content:''; position:absolute; bottom:0; left:0; width:100%; height:1px; background:#000; }
.corner--bl::after  { content:''; position:absolute; bottom:0; left:0; width:1px;  height:100%; background:#000; }

.corner--br { bottom:26px; right:30px; }
.corner--br::before { content:''; position:absolute; bottom:0; right:0; width:100%; height:1px; background:#000; }
.corner--br::after  { content:''; position:absolute; bottom:0; right:0; width:1px;  height:100%; background:#000; }

.logo-wrap {
  position: fixed; top: 50%; left: 50%;
  z-index: 5; opacity: 0; color: #000;
  animation: logo-rise 1.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  will-change: transform;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), filter 0.5s ease;
}
@keyframes logo-rise {
  from { opacity:0; transform:translate(-50%,-50%) translateY(10px); }
  to   { opacity:1; transform:translate(-50%,-50%) translateY(0); }
}
/* Logo blend mode: multiply on white bg, screen on black bg */
.logo-img {
  width: clamp(240px, 30vw, 420px);
  height: auto; display: block;
}



.top-text {
  position: fixed; top: 58px; left: 0; right: 0;
  text-align: center; z-index: 5;
  opacity: 0; animation: rise 1.4s cubic-bezier(0.22,1,0.36,1) 0.8s forwards;
}
.top-text p {
  font-size: clamp(7.5px, 1.05vw, 12px);
  font-weight: 400; letter-spacing: 0.22em;
  line-height: 2.2; text-transform: uppercase; color: #000;
}
@media (max-width: 600px) {
  .top-text p { font-size: 7px; letter-spacing: 0.14em; line-height: 2.0; }
  .bottom-text p { font-size: 7px; letter-spacing: 0.14em; }
}

.bottom-text {
  position: fixed; bottom: 58px; left: 0; right: 0;
  text-align: center; z-index: 5;
  display: flex; flex-direction: column-reverse; align-items: center;
  opacity: 0; animation: rise 1.4s cubic-bezier(0.22,1,0.36,1) 1s forwards;
}
.bottom-text p {
  font-size: clamp(9px, 1.05vw, 12px);
  font-weight: 400; letter-spacing: 0.22em;
  line-height: 2.5; text-transform: uppercase; color: #000;
  animation: text-breathe 10s ease-in-out infinite;
}

.reveal {
  margin-bottom: 20px; margin-top: 0;
  display: flex; align-items: center; gap: 12px;
  width: 100%; justify-content: center;
  opacity: 0; animation: fade 1s ease 1.6s forwards;
}
.reveal::before, .reveal::after {
  content: ""; display: block;
  flex: 1; height: 1px;
  background: #000; opacity: 0.2; max-width: 28px;
}
.reveal-text-wrap {
  position: relative; display: flex;
  align-items: center; justify-content: center;
}
.reveal span {
  font-size: clamp(9px, 1.05vw, 12px);
  letter-spacing: 0.22em; text-transform: uppercase;
  color: #000; font-weight: 400; white-space: nowrap;
}
#text-rewrite {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0; pointer-events: none;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: clamp(9px, 1.05vw, 12px);
  font-weight: 400; letter-spacing: 0.22em;
  text-transform: uppercase; color: #000;
  transition: opacity 0.5s ease; white-space: nowrap;
}
#text-rewrite.inverted { color: #fff; }

.meta {
  position: fixed; bottom: 26px; left: 0; right: 0;
  display: flex; justify-content: space-between;
  padding: 0 48px; z-index: 10;
  opacity: 0; animation: fade 1s ease 2s forwards;
}
.meta span {
  font-size: 6.5px; letter-spacing: 0.3em;
  text-transform: uppercase; text-indent: 0.3em;
  color: #000; opacity: 0.28;
}

@keyframes rise {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fade { to { opacity:1; } }
@keyframes text-breathe {
  0%, 100% { letter-spacing: 0.22em; }
  50%       { letter-spacing: 0.255em; }
}

/* GHOST TEXT */
#ghost-text {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, calc(-50% + clamp(60px, 8vw, 100px)));
  z-index: 20;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 10px; letter-spacing: 0.38em;
  text-transform: uppercase; text-indent: 0.38em;
  color: #000; opacity: 0; pointer-events: none;
  transition: opacity 0.8s ease; white-space: nowrap;
}
#ghost-text.inverted { color: #fff; }

/* INVERSION OVERLAY */
#inversion {
  position: fixed; inset: 0; background: #000;
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity 0.06s ease;
}

/* SWEEP LINE */
#sweep-line {
  position: fixed; top: 0; bottom: 0; left: -1px;
  width: 0.5px; background: #000;
  z-index: 20; opacity: 0; pointer-events: none;
}
#sweep-line.inverted { background: #fff; }

/* CHROMATIC MODE */
body.chromatic { background: #ffffff; }
/* nacre-shift removed — pure white chromatic bg */
body.chromatic .top-text p,
body.chromatic .bottom-text p,
body.chromatic .reveal span,
body.chromatic .meta span,
body.chromatic #ghost-text,
body.chromatic #text-rewrite {
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: chromatic-shift 8s linear infinite;
}
body.chromatic .corner::before,
body.chromatic .corner::after {
  background: linear-gradient(135deg, #c8a97e, #a0c4d8, #c4aad0) !important;
}
body.chromatic .line-top,
body.chromatic .line-bottom {
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%; animation: chromatic-shift 8s linear infinite;
  box-shadow: 0 0 6px rgba(160,196,216,0.4);
}
body.chromatic .corner { box-shadow: 0 0 5px rgba(196,170,208,0.35); }
body.inverted .corner::before,
body.inverted .corner::after { background: #fff !important; }
body.chromatic #chromatic-btn #chromatic-label {
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%; -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  animation: chromatic-shift 8s linear infinite;
}
/* Chromatic logo — same gradient as text, masked by logo shape */
body.chromatic .logo-img {
  opacity: 0;
}
body.chromatic .logo-wrap::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  animation: chromatic-shift 8s linear infinite;
  -webkit-mask-image: var(--logo-mask);
  mask-image: var(--logo-mask);
  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
}
body.chromatic .logo-wrap.logo-hovered {
  transform: translate(-50%, -50%) scaleX(1.06) !important;
  filter: drop-shadow(0 0 14px #a0c4d875) !important;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), filter 0.5s ease;
}
@keyframes chromatic-shift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* CHROMATIC BUTTON */
#chromatic-btn {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%); z-index: 20;
  background: none; border: none; cursor: none; padding: 0;
  opacity: 0; animation: fade 1s ease 2.5s forwards;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 6.5px; letter-spacing: 0.34em;
  text-transform: uppercase; text-indent: 0.34em;
  color: #000; transition: opacity 0.4s ease;
}
#chromatic-btn:hover { opacity: 0.6 !important; }

/* SNAKE BUTTON */
#snake-btn {
  position: fixed; top: 26px; left: 50%;
  transform: translateX(-50%); z-index: 20;
  background: none; border: none; cursor: none; padding: 0;
  display: none;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 6.5px; letter-spacing: 0.34em;
  text-transform: uppercase; text-indent: 0.34em;
  color: #000; transition: opacity 0.4s ease; opacity: 0.45;
}
body.chromatic #snake-btn {
  display: block;
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: chromatic-shift 8s linear infinite;
  opacity: 0.7;
}
#snake-btn:hover { opacity: 1 !important; }

/* GAME HUD — score/goal replaces snake-btn during games */
#game-hud {
  position: fixed; top: 26px; left: 50%;
  transform: translateX(-50%); z-index: 30;
  display: none;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: clamp(8px, 1.1vw, 11px); letter-spacing: 0.32em; text-transform: uppercase;
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: chromatic-shift 8s linear infinite;
  pointer-events: none;
}
body.any-game-active #snake-btn { display: none !important; }
body.any-game-active #bg { opacity: 0 !important; }
body.any-game-active #game-hud { display: block; }

/* COUNTDOWN — behind logo (z-index 4), same size as score */
#countdown {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 4;
  display: none;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: clamp(240px, 30vw, 420px); font-weight: 700;
  line-height: 1; letter-spacing: -0.02em;
  color: transparent;
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  animation: chromatic-shift 8s linear infinite;
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s ease;
}

/* FIRE CANVAS */
#fire-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 2; pointer-events: none; display: none; opacity: 0;
  transition: opacity 1.5s ease;
}
body.fire-active #fire-canvas { display: block; }
body.fire-active #fire-canvas.fire-visible { opacity: 1; }

/* SNAKE SCORE */
#snake-score {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 26;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: clamp(240px, 30vw, 420px); font-weight: 700;
  line-height: 1; letter-spacing: -0.02em;
  color: transparent;
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  animation: chromatic-shift 8s linear infinite;
  pointer-events: none; display: none; opacity: 0.12;
  transition: opacity 0.5s ease;
}
body.snake-active #snake-score, body.pac-active #snake-score, body.flp-active #snake-score { display: block; }
body.any-game-active:not(.counting) #snake-score { display: block; }
body.counting #snake-score { display: none !important; }

/* SNAKE CANVAS */
#snake-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 25; pointer-events: none; display: none;
}
body.snake-active #snake-canvas { display: block; pointer-events: all; }

/* PACMAN CANVAS */
#pac-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 25; pointer-events: none; display: none;
}
body.pac-active #pac-canvas { display: block; pointer-events: all; }

#flp-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 25; pointer-events: none; display: none;
}
body.flp-active #flp-canvas { display: block; pointer-events: all; }

/* CURSOR TRAIL */
.cursor-trail {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%, -50%);
  transition: opacity 0.6s ease;
}

/* CLICK PARTICLES */
.click-particle {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
}

/* LOGO HOVER (chromatic) */
body.chromatic .logo-wrap {
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), filter 0.5s ease;
}

/* CRYPTIC LONG-PRESS MESSAGE */
#cryptic-msg {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, calc(-50% + 70px));
  z-index: 6;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: clamp(11px, 1.4vw, 16px); font-weight: 400; letter-spacing: 0.34em;
  text-transform: uppercase; text-indent: 0.38em;
  color: #000; opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease; white-space: nowrap;
}
body.inverted #cryptic-msg { color: #fff; }
body.chromatic #cryptic-msg {
  background: linear-gradient(90deg, #c8a97e, #a0c4d8, #c4aad0, #7ec8b4, #c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: chromatic-shift 8s linear infinite;
}

/* GAME GRID — chromatic grid behind games */
#game-grid {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 24; pointer-events: none; display: none; opacity: 0;
  transition: opacity 0.8s ease;
}
body.any-game-active #game-grid { display: block; }
body.any-game-active.grid-ready #game-grid { opacity: 1; }

/* LOADING RING — around logo, standard mode only */
#logo-ring {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none;
  width: clamp(320px, 40vw, 520px);
  height: clamp(320px, 40vw, 520px);
}
/* B: hand canvas */
#ring-hand-canvas {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none;
  width: clamp(320px, 40vw, 520px);
  height: clamp(320px, 40vw, 520px);
}
body.inverted #ring-hand-canvas { filter: invert(1); }
body.chromatic #ring-hand-canvas { display: none; }
body.any-game-active #ring-hand-canvas { display: none; }
body.chromatic #logo-ring { display: none; }
body.any-game-active #logo-ring { display: none; }

/* SWEEP GRID CANVAS — always visible, drawn independently from #bg */
#sweep-grid-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 3; pointer-events: none;
}

/* CENTER LINE — horizontal anchor at logo height */
#center-line {
  position: fixed; top: 50%; left: 0; right: 0;
  height: 0.3px; background: #000;
  z-index: 3; pointer-events: none;
  opacity: 0.06;
  transform: translateY(-50%);
  transition: background 1800ms ease, opacity 0.8s ease;
}
body.inverted #center-line { background: #fff; opacity: 0.08; }
body.chromatic #center-line { opacity: 0; }
body.any-game-active #center-line { opacity: 0; }

/* PERMANENT SLOW SCAN — vertical line traversing screen every 30s */
#slow-scan {
  position: fixed; top: 0; bottom: 0;
  width: 0.2px; background: #000;
  z-index: 3; pointer-events: none;
  opacity: 0.04;
  transition: background 1800ms ease;
}
body.inverted #slow-scan { background: #fff; opacity: 0.05; }
body.chromatic #slow-scan { opacity: 0; }
body.any-game-active #slow-scan { opacity: 0; }

/* BLINKING TERMINAL DOT after "First Reveal Soon" */
#reveal-dot {
  display: inline-block;
  opacity: 1;
  animation: dot-blink 1.4s steps(1, end) infinite;
  margin-left: 0.15em;
  font-size: inherit;
  color: inherit;
  font-weight: 400;
  letter-spacing: 0;
}
@keyframes dot-blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}
body.chromatic #reveal-dot {
  -webkit-text-fill-color: inherit;
  background: none;
  animation: dot-blink 1.4s steps(1, end) infinite;
}



/* ── TRADE MODE ────────────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400&family=Cormorant+Garamond:wght@300;400;500&display=swap');

body.trade { background: #ede9e2; }
body.trade #bg,
body.trade .top-text,
body.trade .bottom-text,
body.trade #logo-ring,
body.trade #ring-hand-canvas,
body.trade #slow-scan,
body.trade #center-line,
body.trade .corner { opacity: 0 !important; pointer-events: none !important; }
body.trade .logo-wrap { opacity: 0 !important; pointer-events: none !important; }

#trade-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 40;
  background: #ede9e2;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
body.trade #trade-overlay { display: flex; flex-direction: column; align-items: center; gap: 14px; }

/* Wordmark */

#trade-logo {
  width: clamp(160px, 20vw, 260px);
  height: auto;
  display: block;
  margin-bottom: 8px;
  opacity: 0.85;
  filter: invert(0);
}

#trade-wordmark-UNUSED {
  font-family: 'Cormorant Garamond', 'Georgia', serif;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.52em; text-transform: uppercase; text-indent: 0.52em;
  color: rgba(0,0,0,0.2); margin-bottom: 2px;
}

/* Main glass card */
#trade-card {
  width: min(480px, 100%);
  background: rgba(255,255,255,0.52);
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  border: 0.5px solid rgba(255,255,255,0.88);
  border-radius: 24px;
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.92) inset,
    0 -1px 0 0 rgba(0,0,0,0.04) inset,
    0 8px 40px rgba(0,0,0,0.07),
    0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden; position: relative;
}
#trade-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg,rgba(255,255,255,0.38) 0%,rgba(255,255,255,0.04) 50%,rgba(255,255,255,0.12) 100%);
  pointer-events: none; border-radius: inherit;
}

/* Card header */
#trade-header {
  padding: 22px 26px 16px;
  display: flex; justify-content: space-between; align-items: flex-start;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
}
#trade-pair {
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 7px; font-weight: 400; letter-spacing: 0.36em;
  text-transform: uppercase; color: rgba(0,0,0,0.32); margin-bottom: 6px;
}
#trade-price {

}

/* Chart */
#trade-chart-wrap { padding: 16px 26px 0; }
#trade-chart { width: 100%; height: 100px; display: block; }

/* Timer */
#trade-timer-wrap { padding: 14px 26px 0; }
#trade-timer-row {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
}
#trade-timer-label, #trade-timer-secs {
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 7px; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase;

}
#trade-timer-track {
  height: 1px; background: rgba(0,0,0,0.08); border-radius: 1px; overflow: hidden;
}
#trade-timer-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg,#c8a97e,#a0c4d8,#c4aad0,#7ec8b4);

  animation: tshift 4s linear infinite;
  transition: width 1s linear;
}
@keyframes tshift { 0%{background-position:0%} 100%{background-position:200%} }

/* Bet buttons */
#trade-bet-wrap {
  padding: 16px 26px 22px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.t-bet {
  display: flex; align-items: center; justify-content: center; gap: 8px;

  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 7.5px; font-weight: 400; letter-spacing: 0.32em; text-transform: uppercase;
  color: rgba(0,0,0,0.5);
  box-shadow: 0 1px 0 rgba(255,255,255,0.82) inset, 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.15s ease;
}
.t-bet:hover:not(:disabled) {
  background: rgba(255,255,255,0.72);
  color: rgba(0,0,0,0.78);
  border-color: rgba(0,0,0,0.2);
  box-shadow: 0 1px 0 rgba(255,255,255,0.95) inset, 0 4px 16px rgba(0,0,0,0.06);
}
.t-bet:disabled { opacity: 0.22; cursor: default; }
.t-bet .t-arrow { font-size: 15px; line-height: 1; }
#t-higher .t-arrow { color: rgba(126,200,180,0.85); }
#t-lower  .t-arrow { color: rgba(200,169,126,0.85); }

/* Result */
#trade-res {
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: clamp(8px, 1.0vw, 10px); font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase;
  background: linear-gradient(90deg,#c8a97e,#a0c4d8,#c4aad0,#7ec8b4,#c8a97e);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: chromatic-shift 8s linear infinite;
  min-height: 18px; text-align: center;
  opacity: 0; transition: opacity 0.4s ease;
}
#trade-res.visible { opacity: 1; }

/* Stats glass pill */
#trade-stats {
  width: min(480px, 100%);
  background: rgba(255,255,255,0.38);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 0.5px solid rgba(255,255,255,0.78);
  border-radius: 18px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.88) inset, 0 4px 20px rgba(0,0,0,0.05);
  padding: 14px 20px;
  display: grid; grid-template-columns: 1fr 0.5px 1fr 0.5px 1fr;
  align-items: center;
}
.t-stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.t-stat-val {
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 22px; font-weight: 200; color: #1a1a1a; line-height: 1;
  letter-spacing: 0.02em;
}
.t-stat-lbl {
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 6.5px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(0,0,0,0.28);
}
.t-divider { width: 0.5px; height: 26px; background: rgba(0,0,0,0.08); margin: 0 auto; }

/* Close */
#trade-close {
  position: absolute; top: 22px; right: 24px;
  background: none; border: none; cursor: pointer;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  font-size: 6.5px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(0,0,0,0.28); transition: opacity 0.2s ease;
}
#trade-close:hover { opacity: 0.7; }

#countdown {

#snake-canvas {

  position: fixed; inset: 0; width: 100%; height: 100%;

#game-grid {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 24; pointer-events: none; display: none; opacity: 0;
  transition: opacity 0.8s ease;
}
body.any-game-active #game-grid { display: block; }
body.any-game-active.grid-ready #game-grid { opacity: 1; }

/* LOADING RING — around logo, standard mode only */
#logo-ring {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none;
  width: clamp(320px, 40vw, 520px);
  height: clamp(320px, 40vw, 520px);
}
/* B: hand canvas */
#ring-hand-canvas {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none;
  width: clamp(320px, 40vw, 520px);
  height: clamp(320px, 40vw, 520px);
}
body.inverted #ring-hand-canvas { filter: invert(1); }
body.chromatic #ring-hand-canvas { display: none; }
body.any-game-active #ring-hand-canvas { display: none; }
body.chromatic #logo-ring { display: none; }
body.any-game-active #logo-ring { display: none; }

/* SWEEP GRID CANVAS — always visible, drawn independently from #bg */
#sweep-grid-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 3; pointer-events: none;
}

/* CENTER LINE — horizontal anchor at logo height */
#center-line {
  position: fixed; top: 50%; left: 0; right: 0;
  height: 0.3px; background: #000;
  z-index: 3; pointer-events: none;
  opacity: 0.06;
  transform: translateY(-50%);
  transition: background 1800ms ease, opacity 0.8s ease;
}
body.inverted #center-line { background: #fff; opacity: 0.08; }
body.chromatic #center-line { opacity: 0; }
body.any-game-active #center-line { opacity: 0; }

/* PERMANENT SLOW SCAN — vertical line traversing screen every 30s */
#slow-scan {
  position: fixed; top: 0; bottom: 0;
  width: 0.2px; background: #000;
  z-index: 3; pointer-events: none;
  opacity: 0.04;
  transition: background 1800ms ease;
}
body.inverted #slow-scan { background: #fff; opacity: 0.05; }
body.chromatic #slow-scan { opacity: 0; }
body.any-game-active #slow-scan { opacity: 0; }

/* BLINKING TERMINAL DOT after "First Reveal Soon" */
#reveal-dot {
  display: inline-block;
  opacity: 1;
  animation: dot-blink 1.4s steps(1, end) infinite;
  margin-left: 0.15em;
  font-size: inherit;
  color: inherit;
  font-weight: 400;
  letter-spacing: 0;
}
@keyframes dot-blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}
body.chromatic #reveal-dot {
  -webkit-text-fill-color: inherit;
  background: none;
  animation: dot-blink 1.4s steps(1, end) infinite;
}


/* Trade trigger — replaces MMXXV in meta */
#trade-trigger {
  cursor: pointer;
  transition: opacity 0.3s ease;
}
#trade-trigger:hover { opacity: 0.7 !important; }
body.trade #trade-trigger { opacity: 0.7 !important; }

</style>
</head>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// -- CANVAS SETUP -----------------------------------------------------
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, t = 0, layers = [];
let offBack, offMid, ctxBack, ctxMid;
let ghostOrb      = null;
let isInverted    = false;
let chromaticOn   = false;
let convergeFactor= 0;
let frozenOrbs    = null;
let canvasRotation= 0;
let rotationTarget= 0;
let sweepScanX    = -1;
let sweepScanStart= 0;
const SWEEP_DURATION = 3200;
let chromaticWaves = [];
let explosions     = [];
let vortexActive   = false;
let vortexX = 0, vortexY = 0;

function makeOff(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

function init() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const s = Math.min(W, H);
  offBack = makeOff(W, H); offMid = makeOff(W, H);
  ctxBack = offBack.getContext('2d');
  ctxMid  = offMid.getContext('2d');

  layers = [
    // BACK (z=0)
    { x:W*0.05, y:H*0.75, r:s*0.22, vx: 0.08, vy:-0.05, phase:0.0, lw:0.09, baseA:0.14, a:0, z:0 },
    { x:W*0.85, y:H*0.20, r:s*0.20, vx:-0.06, vy: 0.04, phase:2.1, lw:0.08, baseA:0.09, a:0, z:0 },
    { x:W*0.50, y:H*0.90, r:s*0.18, vx: 0.05, vy:-0.03, phase:3.8, lw:0.08, baseA:0.08, a:0, z:0 },
    // MID (z=1)
    { x:W*0.12, y:H*0.22, r:s*0.22, vx: 0.14, vy: 0.09, phase:1.1, lw:0.19, baseA:0.34, a:0, z:1 },
    { x:W*0.78, y:H*0.65, r:s*0.17, vx:-0.12, vy:-0.10, phase:4.2, lw:0.12, baseA:0.33, a:0, z:1 },
    { x:W*0.40, y:H*0.08, r:s*0.19, vx: 0.11, vy: 0.13, phase:2.6, lw:0.19, baseA:0.16, a:0, z:1 },
    { x:W*0.92, y:H*0.50, r:s*0.14, vx:-0.10, vy: 0.08, phase:0.4, lw:0.10, baseA:0.34, a:0, z:1 },
    // FRONT (z=2)
    { x:W*0.30, y:H*0.55, r:s*0.065, vx:-0.22, vy:-0.17, phase:1.5, lw:0.12, baseA:0.46, a:0, z:2 },
    { x:W*0.68, y:H*0.30, r:s*0.045, vx: 0.26, vy: 0.14, phase:3.3, lw:0.10, baseA:0.62, a:0, z:2 },
    { x:W*0.15, y:H*0.82, r:s*0.035, vx: 0.18, vy:-0.21, phase:5.1, lw:0.10, baseA:0.55, a:0, z:2 },
    { x:W*0.58, y:H*0.14, r:s*0.040, vx:-0.18, vy: 0.19, phase:2.0, lw:0.10, baseA:0.40, a:0, z:2 },
  ];
  layers.forEach(o => { o.glitch = undefined; });
}

function scheduleGlitch(o) {
  if (o.z === 0) return;
  o.glitch      = 'idle';
  o.glitchTimer = Math.floor(900 + Math.random() * 1500);
  o.glitchDur   = Math.floor(50 + Math.random() * 40);
  o.glitchAge   = 0;
  o.glitchSeed  = Math.random() * 1000;
}

function drawGlitchedOrb(o, targetCtx, r, alpha) {
  const cx = o.x, cy = o.y;
  const dir = o.glitchSeed > 500 ? 1 : -1;
  targetCtx.beginPath();
  targetCtx.arc(cx, cy, r, 0, Math.PI * 2);
  targetCtx.strokeStyle = 'rgba(255,0,0,1.0)';
  targetCtx.lineWidth   = o.lw;
  targetCtx.stroke();
  const spinAngle = (o.glitchAge / o.glitchDur) * Math.PI * 2 * dir;
  const arcStart  = spinAngle;
  const arcEnd    = spinAngle + Math.PI * 0.7;
  targetCtx.beginPath();
  targetCtx.arc(cx, cy, r * 0.82, arcStart, arcEnd);
  targetCtx.strokeStyle = 'rgba(255,0,0,1.0)';
  targetCtx.lineWidth   = o.lw * 0.8;
  targetCtx.stroke();
}

function drawOrbs(list, targetCtx, fadeSpd) {
  for (const o of list) {
    o.a = Math.min(1, o.a + fadeSpd);
    if (o.glitch === undefined) scheduleGlitch(o);
    const breathe = chromaticOn
      ? Math.sin(t * 0.0008 * Math.PI * 2) * (o.r * 0.06)
      : Math.sin(t * 0.0004 * Math.PI * 2 + o.phase) * (o.r * 0.025);
    const r     = Math.max(1, o.r + breathe);
    const pulse = 0.02 * Math.sin(t * 0.0006 * Math.PI * 2 + o.phase + 0.8);
    const alpha = o.a * (o.baseA + pulse);

    if (o.glitch === 'idle') {
      o.glitchTimer--;
      if (o.glitchTimer <= 0) {
        o.glitch = 'active'; o.glitchAge = 0; o.glitchSeed = Math.random() * 1000;
      }
    }
    if (o.glitch === 'active') {
      o.glitchAge++;
      drawGlitchedOrb(o, ctx, r, 1.0);
      if (o.glitchAge >= o.glitchDur) o.glitch = 'snap';
    } else if (o.glitch === 'snap') {
      ctx.beginPath(); ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(220,0,0,0.9)';
      ctx.lineWidth   = o.lw * 1.5; ctx.stroke();
      scheduleGlitch(o);
    } else {
      targetCtx.beginPath(); targetCtx.arc(o.x, o.y, r, 0, Math.PI * 2);
      if (chromaticOn && !isInverted) {
        const hue = (o.phase * 57 + t * 0.12) % 360;
        const sat = 85 + 15 * Math.sin(t * 0.001 + o.phase);
        const lit = 45 + 10 * Math.cos(t * 0.0013 + o.phase);
        targetCtx.strokeStyle = `hsla(${hue.toFixed(0)},${sat.toFixed(0)}%,${lit.toFixed(0)}%,${Math.max(0.18, alpha * 2.5).toFixed(3)})`;
      } else {
        const normalColor = isInverted ? '255,255,255' : '0,0,0';
        targetCtx.strokeStyle = `rgba(${normalColor},${Math.max(0.02, alpha).toFixed(3)})`;
      }
      targetCtx.lineWidth = o.lw; targetCtx.stroke();
    }

    const toCx = (W / 2 - o.x) * 0.003 * convergeFactor;
    const toCy = (H / 2 - o.y) * 0.003 * convergeFactor;
    const toVx = vortexActive ? (vortexX - o.x) * 0.012 : 0;
    const toVy = vortexActive ? (vortexY - o.y) * 0.012 : 0;
    if (!frozenOrbs) {
      o.x += o.vx + toCx + toVx;
      o.y += o.vy + toCy + toVy;
    }
    const pad = r + 2;
    if (o.x < -pad) o.x = W + pad; if (o.x > W + pad) o.x = -pad;
    if (o.y < -pad) o.y = H + pad; if (o.y > H + pad) o.y = -pad;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  t++;

  // Canvas rotation
  canvasRotation += (rotationTarget - canvasRotation) * 0.03;

  // BACK
  ctxBack.clearRect(0, 0, W, H);
  drawOrbs(layers.filter(o => o.z === 0), ctxBack, 0.005);
  ctx.save();
  ctx.translate(W/2, H/2); ctx.rotate(canvasRotation); ctx.translate(-W/2, -H/2);
  ctx.filter = 'blur(2.5px)'; ctx.drawImage(offBack, 0, 0); ctx.restore();

  // MID
  ctxMid.clearRect(0, 0, W, H);
  drawOrbs(layers.filter(o => o.z === 1), ctxMid, 0.008);
  ctx.save();
  ctx.translate(W/2, H/2); ctx.rotate(canvasRotation); ctx.translate(-W/2, -H/2);
  ctx.filter = 'blur(0.8px)'; ctx.drawImage(offMid, 0, 0); ctx.restore();

  // FRONT
  ctx.filter = 'none';
  ctx.save();
  ctx.translate(W/2, H/2); ctx.rotate(canvasRotation); ctx.translate(-W/2, -H/2);
  drawOrbs(layers.filter(o => o.z === 2), ctx, 0.012);
  ctx.restore();

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.68);
  vig.addColorStop(0,   'rgba(255,255,255,0)');
  vig.addColorStop(0.6, 'rgba(255,255,255,0)');
  vig.addColorStop(1,   'rgba(170,167,163,0.10)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  // Central glow
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W,H)*0.35);
  glow.addColorStop(0, 'rgba(252,250,247,0.18)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  // Ghost orb doubling
  if (ghostOrb) {
    ghostOrb.life++;
    const lifeP  = ghostOrb.life / ghostOrb.maxLife;
    const env    = lifeP < 0.5 ? lifeP * 2 : (1 - lifeP) * 2;
    const gAlpha = env * 0.13;
    ctx.beginPath(); ctx.arc(ghostOrb.x, ghostOrb.y, ghostOrb.r, 0, Math.PI * 2);
    ctx.strokeStyle = isInverted
      ? `rgba(255,255,255,${gAlpha.toFixed(3)})`
      : `rgba(0,0,0,${gAlpha.toFixed(3)})`;
    ctx.lineWidth = ghostOrb.lw; ctx.stroke();
    ghostOrb.x += 0.04; ghostOrb.y -= 0.02;
    if (ghostOrb.life >= ghostOrb.maxLife) ghostOrb = null;
  }

  // Chromatic: connection lines
  if (chromaticOn && !isInverted) {
    const allOrbs = layers.filter(o => o.z >= 1 && o.a > 0.5);
    const maxDist = Math.min(W, H) * 0.22;
    ctx.save();
    for (let i = 0; i < allOrbs.length; i++) {
      for (let j = i + 1; j < allOrbs.length; j++) {
        const a = allOrbs[i], b = allOrbs[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < maxDist) {
          const fade = 1 - dist / maxDist;
          const hue  = (a.phase * 57 + t * 0.12) % 360;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `hsla(${hue.toFixed(0)},90%,65%,${(fade * 0.18).toFixed(3)})`;
          ctx.lineWidth = 0.4; ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  // Chromatic: orb explosions
  if (chromaticOn && explosions.length) {
    ctx.save();
    for (let i = explosions.length - 1; i >= 0; i--) {
      const ex = explosions[i];
      ex.age++;
      const p      = ex.age / ex.maxAge;
      const waveR  = ex.r * (1 + p * 2.5);
      const aAlpha = (1 - p) * 0.5;
      ctx.beginPath(); ctx.arc(ex.x, ex.y, waveR, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${ex.hue.toFixed(0)},90%,65%,${aAlpha.toFixed(3)})`;
      ctx.lineWidth = (1 - p) * 1.5; ctx.stroke();
      if (ex.age >= ex.maxAge) explosions.splice(i, 1);
    }
    ctx.restore();
  }

  // Chromatic wave + scan grid
  if (chromaticOn && !isInverted && chromaticWaves.length) {
    ctx.save();
    for (let i = chromaticWaves.length - 1; i >= 0; i--) {
      const wv = chromaticWaves[i];
      wv.age++;
      const p  = wv.age / wv.maxAge;
      wv.x     = W * p;

      // Scan grid left of wave
      if (wv.x > 0) {
        const gs = 28;
        const gridAlpha = 0.18 * Math.sin(p * Math.PI);
        ctx.strokeStyle = `rgba(160,196,216,${gridAlpha.toFixed(3)})`;
        ctx.lineWidth = 0.7; ctx.beginPath();
        for (let gx = 0; gx < wv.x; gx += gs) { ctx.moveTo(gx, 0); ctx.lineTo(gx, H); }
        for (let gy = 0; gy < H; gy += gs)     { ctx.moveTo(0, gy); ctx.lineTo(wv.x, gy); }
        ctx.stroke();
      }

      // Chromatic band
      const bw   = W * 0.45;
      const grad = ctx.createLinearGradient(wv.x - bw, 0, wv.x + bw, 0);
      grad.addColorStop(0,   'rgba(200,169,126,0)');
      grad.addColorStop(0.2, `rgba(160,196,216,${(0.13 * Math.sin(p * Math.PI)).toFixed(3)})`);
      grad.addColorStop(0.4, `rgba(196,170,208,${(0.18 * Math.sin(p * Math.PI)).toFixed(3)})`);
      grad.addColorStop(0.6, `rgba(126,200,180,${(0.15 * Math.sin(p * Math.PI)).toFixed(3)})`);
      grad.addColorStop(0.8, `rgba(200,169,126,${(0.13 * Math.sin(p * Math.PI)).toFixed(3)})`);
      grad.addColorStop(1,   'rgba(160,196,216,0)');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

      // Scan line at front
      const lineGrad = ctx.createLinearGradient(0, 0, 0, H);
      lineGrad.addColorStop(0,   'rgba(196,170,208,0)');
      lineGrad.addColorStop(0.3, `rgba(196,170,208,${(0.55 * Math.sin(p * Math.PI)).toFixed(3)})`);
      lineGrad.addColorStop(0.7, `rgba(160,196,216,${(0.55 * Math.sin(p * Math.PI)).toFixed(3)})`);
      lineGrad.addColorStop(1,   'rgba(160,196,216,0)');
      ctx.strokeStyle = lineGrad; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(wv.x, 0); ctx.lineTo(wv.x, H); ctx.stroke();

      if (wv.age >= wv.maxAge) chromaticWaves.splice(i, 1);
    }
    ctx.restore();
  }

  // Sweep scan grid — drawn on dedicated always-visible canvas
  const sgCanvas = document.getElementById('sweep-grid-canvas');
  if (sgCanvas) {
    sgCanvas.width = W; sgCanvas.height = H;
    const sgCtx = sgCanvas.getContext('2d');
    sgCtx.clearRect(0, 0, W, H);
    if (sweepScanX >= 0) {
      const elapsed = performance.now() - sweepScanStart;
      const rawP    = Math.min(elapsed / SWEEP_DURATION, 1);
      const eased   = rawP < 0.5 ? 2 * rawP * rawP : -1 + (4 - 2 * rawP) * rawP;
      sweepScanX    = W * eased;
      const maxAlpha  = isInverted ? 0.35 : 0.28;
      const envelope  = Math.sin(rawP * Math.PI);
      const gridAlpha = maxAlpha * envelope;
      const lineColor = `rgba(120,120,120,${gridAlpha.toFixed(3)})`;
      if (sweepScanX > 0 && gridAlpha > 0.005) {
        sgCtx.save();
        sgCtx.strokeStyle = lineColor; sgCtx.lineWidth = 0.3; sgCtx.beginPath();
        const gs = 28;
        for (let gx = 0; gx <= sweepScanX; gx += gs) { sgCtx.moveTo(gx, 0); sgCtx.lineTo(gx, H); }
        for (let gy = 0; gy < H; gy += gs)            { sgCtx.moveTo(0, gy); sgCtx.lineTo(Math.min(sweepScanX, W), gy); }
        sgCtx.stroke(); sgCtx.restore();
      }
    }
  }

  requestAnimationFrame(draw);
}

const INVERT_FADE_OUT = 1800;

function applyInversion(on) {
  const allText  = [...document.querySelectorAll('.top-text p, .bottom-text p, .reveal span, .meta span')];
  const allFrame = [...document.querySelectorAll('.corner')];
  if (on) {
    isInverted = true;
    bodyEl.style.transition  = 'none'; canvas.style.transition = 'none';
    logoImg.style.transition = 'none'; logoImg.style.opacity   = '1';
    document.body.classList.add('inverted');
    logoImg.style.filter = 'invert(1)';
    allText.forEach(el  => { el.style.transition = 'none'; el.style.color = '#fff'; });
    allFrame.forEach(el => { el.style.transition = 'none'; el.style.borderColor = '#fff'; el.style.background = '#fff'; });
    bodyEl.style.background = '#000'; canvas.style.background = '#000';
    ghostEl.classList.add('inverted'); sweepEl.classList.add('inverted');
  } else {
    const dur = INVERT_FADE_OUT + 'ms', ease = 'ease';
    bodyEl.style.transition  = `background ${dur} ${ease}`;
    canvas.style.transition  = `background ${dur} ${ease}`;
    logoImg.style.transition = 'none';
    allText.forEach(el => {
      el.style.color = '#fff'; el.style.transition = `color ${dur} ${ease}`;
      requestAnimationFrame(() => { el.style.color = '#000'; });
    });
    allFrame.forEach(el => {
      el.style.borderColor = '#fff'; el.style.background = '#fff';
      el.style.transition  = `border-color ${dur} ${ease}, background ${dur} ${ease}`;
      requestAnimationFrame(() => { el.style.borderColor = ''; el.style.background = ''; });
    });
    bodyEl.style.background = '#fff'; canvas.style.background = '#fff';
    setTimeout(() => {
      logoImg.style.transition = 'none';
      document.body.classList.remove('inverted');
      logoImg.style.filter = '';
    }, 10);
    ghostEl.classList.remove('inverted'); sweepEl.classList.remove('inverted');
    setTimeout(() => { isInverted = false; }, INVERT_FADE_OUT);
  }
}

function runInversion() {
  applyInversion(true);
  setTimeout(() => applyInversion(false), 1100);
}

// -- SNAKE GAME --------------------------------------------------------
const snakeCanvas = document.getElementById('snake-canvas');
const snakeCtx    = snakeCanvas.getContext('2d');
const snakeBtn    = document.getElementById('snake-btn');
const GRID        = 32;
const SNAKE_COLORS = ['#c8a97e','#a0c4d8','#c4aad0','#7ec8b4'];
let snakeActive   = false;
let snakeLoop     = null;
let snk, dir, nextDir, food, score, dissolving, dissolveParticles;
let globalScore   = 0; // cumulative across all games
let pacDotEaten   = 0; // pac dots counter for 3:1 ratio

function snakeCols() { return Math.floor(window.innerWidth  / GRID); }
function snakeRows() { return Math.floor(window.innerHeight / GRID); }

function initSnake() {
  snakeCanvas.width  = window.innerWidth;
  snakeCanvas.height = window.innerHeight;
  const cols = snakeCols(), rows = snakeRows();
  const cx = Math.floor(cols / 2), cy = Math.floor(rows / 2);
  snk = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; dissolving = false; dissolveParticles = [];
  placeFood(cols, rows); updateScore();
}

function placeFood(cols, rows) {
  const occupied = new Set(snk.map(s => s.x + ',' + s.y));
  let fx, fy;
  do { fx = Math.floor(Math.random()*cols); fy = Math.floor(Math.random()*rows); }
  while (occupied.has(fx+','+fy));
  food = {x:fx, y:fy, pulse:0};
}

function updateScore() {
  const el = document.getElementById('snake-score');
  if (el) el.textContent = globalScore;
  updateHUD();
}

function stepSnake() {
  if (dissolving) {
    dissolveParticles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life--; p.vx*=0.92; p.vy*=0.92; });
    dissolveParticles = dissolveParticles.filter(p => p.life > 0);
    return;
  }
  dir = {x:nextDir.x, y:nextDir.y};
  const head = {x:snk[0].x+dir.x, y:snk[0].y+dir.y};
  const cols = snakeCols(), rows = snakeRows();

  // Wall = death
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
    triggerDissolve(); return;
  }
  // Self = death
  if (snk.some(s => s.x===head.x && s.y===head.y)) {
    triggerDissolve(); return;
  }
  snk.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++; globalScore++;
    updateScore(); soundEat(); haptic('score');
    spawnFoodParticles(food.x*GRID+GRID/2, food.y*GRID+GRID/2);
    placeFood(cols, rows);
  } else { snk.pop(); }
}

function triggerDissolve() {
  dissolving = true;
  soundDeath(); haptic('death');
  const deathX = snk.length ? snk[0].x*GRID+GRID/2 : window.innerWidth/2;
  const deathY = snk.length ? snk[0].y*GRID+GRID/2 : window.innerHeight/2;
  snk.forEach((s, i) => {
    const cx = s.x*GRID+GRID/2, cy = s.y*GRID+GRID/2;
    for (let p = 0; p < 4; p++) {
      const ang = Math.random()*Math.PI*2, spd = 1+Math.random()*2;
      dissolveParticles.push({ x:cx, y:cy, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        color:SNAKE_COLORS[i%SNAKE_COLORS.length], life:40+Math.floor(Math.random()*20), size:2+Math.random()*2 });
    }
  });
  snk = [];
  setTimeout(() => {
    // Stop snake but keep score, launch pacman
    clearInterval(snakeLoop);
    snakeActive = false;
    snakeCtx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);
    document.body.classList.remove('snake-active');
    snakeBtn.style.opacity = ''; snakeBtn.style.pointerEvents = '';
    launchPacman(deathX, deathY, score);
  }, 900);
}

function spawnFoodParticles(cx, cy) {
  for (let i = 0; i < 8; i++) {
    const ang = (i/8)*Math.PI*2, spd = 20+Math.random()*20;
    const p = document.createElement('div'); p.className = 'click-particle';
    const sz = 2+Math.random()*3;
    p.style.cssText = [`left:${cx}px`,`top:${cy}px`,`width:${sz}px`,`height:${sz}px`,
      `background:${SNAKE_COLORS[i%SNAKE_COLORS.length]}`,'opacity:0.9','transition:none'].join(';');
    document.body.appendChild(p);
    requestAnimationFrame(() => {
      p.style.transition = 'transform 0.6s cubic-bezier(0.22,1,0.36,1), opacity 0.6s ease';
      p.style.transform  = `translate(calc(-50% + ${Math.cos(ang)*spd}px), calc(-50% + ${Math.sin(ang)*spd}px))`;
      p.style.opacity    = '0';
    });
    setTimeout(() => p.remove(), 650);
  }
}

function drawSnake() {
  snakeCanvas.width = window.innerWidth; snakeCanvas.height = window.innerHeight;
  snakeCtx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);

  // Dissolve particles
  dissolveParticles.forEach(p => {
    snakeCtx.save(); snakeCtx.globalAlpha = p.life / 50;
    snakeCtx.fillStyle = p.color; snakeCtx.beginPath();
    snakeCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); snakeCtx.fill(); snakeCtx.restore();
  });
  if (dissolving) return;

  // Food
  food.pulse = (food.pulse||0) + 0.08;
  const fp = Math.sin(food.pulse);
  const fr = GRID*0.22 + fp*GRID*0.05;
  const fx = food.x*GRID+GRID/2, fy = food.y*GRID+GRID/2;
  snakeCtx.save();
  const foodGrad = snakeCtx.createRadialGradient(fx, fy, 0, fx, fy, fr*2);
  foodGrad.addColorStop(0, 'rgba(196,170,208,0.9)');
  foodGrad.addColorStop(0.5, 'rgba(160,196,216,0.4)');
  foodGrad.addColorStop(1, 'rgba(160,196,216,0)');
  snakeCtx.fillStyle = foodGrad; snakeCtx.beginPath(); snakeCtx.arc(fx,fy,fr*2,0,Math.PI*2); snakeCtx.fill();
  snakeCtx.beginPath(); snakeCtx.arc(fx, fy, fr, 0, Math.PI*2);
  snakeCtx.fillStyle = '#c4aad0'; snakeCtx.globalAlpha = 0.85+fp*0.1; snakeCtx.fill();
  snakeCtx.restore();

  // Snake -- luxury ribbon
  if (snk.length > 1) {
    const pts = snk.map(s => ({x:s.x*GRID+GRID/2, y:s.y*GRID+GRID/2}));
    for (let pass = 0; pass < 2; pass++) {
      snakeCtx.save();
      snakeCtx.lineCap = 'round'; snakeCtx.lineJoin = 'round';
      if (pass === 0) { snakeCtx.lineWidth=6; snakeCtx.globalAlpha=0.18; snakeCtx.filter='blur(3px)'; }
      else            { snakeCtx.lineWidth=1.2; snakeCtx.globalAlpha=1; snakeCtx.filter='none'; }
      const h2 = pts[0], t2 = pts[pts.length-1];
      const lg = snakeCtx.createLinearGradient(h2.x, h2.y, t2.x, t2.y);
      lg.addColorStop(0, '#c8a97e'); lg.addColorStop(0.33, '#a0c4d8');
      lg.addColorStop(0.66, '#c4aad0'); lg.addColorStop(1, 'rgba(126,200,180,0.8)');
      snakeCtx.strokeStyle = lg;
      snakeCtx.beginPath(); snakeCtx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length-1; i++) {
        const mx = (pts[i].x+pts[i+1].x)/2, my = (pts[i].y+pts[i+1].y)/2;
        snakeCtx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      snakeCtx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
      snakeCtx.stroke(); snakeCtx.restore();
    }
    // Head orb
    const h = pts[0];
    snakeCtx.save();
    snakeCtx.beginPath(); snakeCtx.arc(h.x, h.y, GRID*0.22, 0, Math.PI*2);
    const hGrad = snakeCtx.createRadialGradient(h.x-2, h.y-2, 0, h.x, h.y, GRID*0.22);
    hGrad.addColorStop(0, '#fff'); hGrad.addColorStop(0.4, '#c8a97e'); hGrad.addColorStop(1, '#a0c4d8');
    snakeCtx.fillStyle = hGrad; snakeCtx.shadowColor = '#c8a97e'; snakeCtx.shadowBlur = 12;
    snakeCtx.fill(); snakeCtx.restore();
  }
}

// ─── SHARED CHROMATIC HELPERS ────────────────────────────────────────────────
const CHROMA = ['#c8a97e','#a0c4d8','#c4aad0','#7ec8b4'];

function chrGrad(ctx, x, y, w) {
  const g = ctx.createLinearGradient(x - w/2, y, x + w/2, y);
  g.addColorStop(0,    '#c8a97e');
  g.addColorStop(0.33, '#a0c4d8');
  g.addColorStop(0.66, '#c4aad0');
  g.addColorStop(1,    '#7ec8b4');
  return g;
}

// Shared: draw a "notched circle" — pacman/ghost base shape
// notchAngle: direction the notch opens; notchSize: half-angle in radians
function drawNotchedCircle(ctx, x, y, r, angle, notchSize, lw, glowColor, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = glowColor; ctx.shadowBlur = 16;
  ctx.strokeStyle = chrGrad(ctx, x, y, r * 2.8);
  ctx.lineWidth = lw;
  ctx.beginPath();
  // arc from (angle+notch) going clockwise around back to (angle-notch)
  ctx.moveTo(x + Math.cos(angle + notchSize) * r, y + Math.sin(angle + notchSize) * r);
  ctx.arc(x, y, r, angle + notchSize, angle - notchSize + Math.PI * 2, false);
  // close back to center for pacman, leave open for ghost
  ctx.stroke();
  ctx.restore();
}

// Pacman: notch+line to center (pie shape)
function drawPacman(ctx, x, y, r, angle, mouthFrac, alpha) {
  const notch = mouthFrac * 0.42;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = '#c8a97e'; ctx.shadowBlur = 20;
  ctx.strokeStyle = chrGrad(ctx, x, y, r * 3);
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + Math.cos(angle + notch) * r, y + Math.sin(angle + notch) * r);
  ctx.arc(x, y, r, angle + notch, angle - notch + Math.PI * 2, false);
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.restore();
}

// Ghost: circle with a small notch (no lines to center), tiny inner dot as "eye"
function drawGhost(ctx, x, y, r, notchAngle, alpha) {
  const notchSize = 0.30;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = '#a0c4d8'; ctx.shadowBlur = 14;
  ctx.strokeStyle = chrGrad(ctx, x, y, r * 2.8);
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.arc(x, y, r, notchAngle + notchSize, notchAngle - notchSize + Math.PI * 2, false);
  ctx.stroke();
  // inner eye dot — subtle
  ctx.globalAlpha = alpha * 0.45;
  ctx.lineWidth = 0.9;
  const ex = x + Math.cos(notchAngle) * r * 0.42;
  const ey = y + Math.sin(notchAngle) * r * 0.42;
  ctx.beginPath(); ctx.arc(ex, ey, 1.8, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

// ─── PACMAN ───────────────────────────────────────────────────────────────────
const pacCanvas = document.getElementById('pac-canvas');
const pacCtx    = pacCanvas.getContext('2d');
const PAC_R     = 14;
const PAC_SPEED = 2.6;
const GHOST_R   = 13;
const DOT_R     = 3;
const DOT_GRID  = 36;
const WAVE_SIZE = 8; // dots to eat per "wave" before ghosts speed up

let pacActive   = false;
let pacLoop     = null;
let pac, ghosts, dots, pacScore, pacT, pacWave;
let pacDissolving = false;
let pacDissolveParticles = [];
let pacEntryAlpha = 0;
let pacDeathX = 0, pacDeathY = 0;

function initPacman(startX, startY, inheritScore) {
  pacCanvas.width  = window.innerWidth;
  pacCanvas.height = window.innerHeight;
  pacT = 0; pacWave = 0;
  pacScore = inheritScore || 0; pacDotEaten = 0;
  pacEntryAlpha = 0;
  pacDissolving = false;
  pacDissolveParticles = [];

  pac = {
    x: startX, y: startY,
    ndx: PAC_SPEED, ndy: 0,
    mouth: 0, mouthDir: 1,
    angle: 0
  };

  // Ghosts: spread evenly around screen, each with unique drift pattern
  // Ghost 0: top-center → chases directly (hunter)
  // Ghost 1: left-mid   → intercepts ahead of pac (predictor)
  // Ghost 2: bottom-right → patrols corners (corner guard)
  // Ghost 3: right-mid  → random drift until close (ambusher)
  const W = window.innerWidth, H = window.innerHeight;
  ghosts = [
    { x: W*0.5,  y: 50,    notch: Math.PI*0.5, vx:0, vy:0, phase:0,        role:'hunter',    spd:0.95 },
    { x: 50,     y: H*0.5, notch: 0,            vx:0, vy:0, phase:Math.PI,  role:'predictor', spd:0.80 },
    { x: W-50,   y: H-50,  notch: Math.PI*1.25, vx:0, vy:0, phase:Math.PI/2,role:'guard',    spd:0.70 },
    { x: W-50,   y: H*0.3, notch: Math.PI,      vx:0, vy:0, phase:Math.PI*1.5,role:'ambusher',spd:0.60 },
  ];

  // Build dot grid — skip center cluster near pac spawn
  dots = [];
  const cols = Math.floor(W / DOT_GRID);
  const rows = Math.floor(H / DOT_GRID);
  for (let gx = 1; gx < cols; gx++) {
    for (let gy = 1; gy < rows; gy++) {
      const dx = gx * DOT_GRID + DOT_GRID/2;
      const dy = gy * DOT_GRID + DOT_GRID/2;
      if (Math.hypot(dx - startX, dy - startY) > DOT_GRID * 3) {
        dots.push({ x: dx, y: dy, alive: true });
      }
    }
  }
  updateScore();
}

function stepPacman() {
  if (pacDissolving) {
    pacDissolveParticles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93; p.life--; });
    pacDissolveParticles = pacDissolveParticles.filter(p => p.life > 0);
    return;
  }
  pacT++;

  // Move pacman — bounce off walls
  pac.x += pac.ndx; pac.y += pac.ndy;
  if (pac.x - PAC_R < 0) { pac.ndx = Math.abs(pac.ndx); pac.x = PAC_R + 1; }
  if (pac.x + PAC_R > window.innerWidth) { pac.ndx = -Math.abs(pac.ndx); pac.x = window.innerWidth - PAC_R - 1; }
  if (pac.y - PAC_R < 0) { pac.ndy = Math.abs(pac.ndy); pac.y = PAC_R + 1; }
  if (pac.y + PAC_R > window.innerHeight) { pac.ndy = -Math.abs(pac.ndy); pac.y = window.innerHeight - PAC_R - 1; }
  if (Math.abs(pac.ndx) > 0.1 || Math.abs(pac.ndy) > 0.1)
    pac.angle = Math.atan2(pac.ndy, pac.ndx);
  pac.mouth += 0.13 * pac.mouthDir;
  if (pac.mouth > 1) { pac.mouth = 1; pac.mouthDir = -1; }
  if (pac.mouth < 0) { pac.mouth = 0; pac.mouthDir = 1; }

  // Wave speed multiplier — ghosts get faster each wave
  const waveSpd = 1 + pacWave * 0.18;

  ghosts.forEach((g, i) => {
    let tx, ty; // target position
    const ahead = 60; // predict pixels ahead

    if (g.role === 'hunter') {
      // Direct chase
      tx = pac.x; ty = pac.y;
    } else if (g.role === 'predictor') {
      // Target where pac will be in a moment
      tx = pac.x + pac.ndx * ahead;
      ty = pac.y + pac.ndy * ahead;
    } else if (g.role === 'guard') {
      // Patrol corners, switches target between nearest corner and pac
      const W = window.innerWidth, H = window.innerHeight;
      const corners = [{x:80,y:80},{x:W-80,y:80},{x:80,y:H-80},{x:W-80,y:H-80}];
      const corner = corners[(Math.floor(pacT / 300) + i) % 4];
      const distToPac = Math.hypot(pac.x - g.x, pac.y - g.y);
      tx = distToPac < 220 ? pac.x : corner.x;
      ty = distToPac < 220 ? pac.y : corner.y;
    } else {
      // Ambusher: random wander until close, then chase
      const distToPac = Math.hypot(pac.x - g.x, pac.y - g.y);
      if (distToPac < 280) { tx = pac.x; ty = pac.y; }
      else {
        tx = g.x + Math.cos(g.phase * 0.7) * 120;
        ty = g.y + Math.sin(g.phase * 1.1) * 80;
      }
    }

    const dx = tx - g.x, dy = ty - g.y;
    const dist = Math.hypot(dx, dy) || 1;
    const spd = g.spd * waveSpd;
    g.vx += (dx / dist) * 0.06;
    g.vy += (dy / dist) * 0.06;
    // slight perpendicular oscillation for organic feel
    const perp = Math.atan2(dy, dx) + Math.PI/2;
    g.vx += Math.cos(perp) * Math.sin(pacT * 0.035 + g.phase) * 0.05;
    g.vy += Math.sin(perp) * Math.sin(pacT * 0.035 + g.phase) * 0.05;
    const spd2 = Math.hypot(g.vx, g.vy);
    if (spd2 > spd) { g.vx = (g.vx/spd2)*spd; g.vy = (g.vy/spd2)*spd; }
    g.x += g.vx; g.y += g.vy;
    // Bounce ghosts off walls
    if (g.x < GHOST_R) { g.vx = Math.abs(g.vx); g.x = GHOST_R + 1; }
    if (g.x > window.innerWidth - GHOST_R) { g.vx = -Math.abs(g.vx); g.x = window.innerWidth - GHOST_R - 1; }
    if (g.y < GHOST_R) { g.vy = Math.abs(g.vy); g.y = GHOST_R + 1; }
    if (g.y > window.innerHeight - GHOST_R) { g.vy = -Math.abs(g.vy); g.y = window.innerHeight - GHOST_R - 1; }
    if (Math.abs(g.vx) > 0.05 || Math.abs(g.vy) > 0.05)
      g.notch = Math.atan2(g.vy, g.vx);
    g.phase += 0.025;
  });

  // Eat dots
  let eaten = 0;
  dots.forEach(d => {
    if (!d.alive) return;
    if (Math.hypot(d.x - pac.x, d.y - pac.y) < PAC_R + DOT_R + 2) {
      d.alive = false; eaten++;
      pacScore++; updateScore();
      spawnFoodParticles(d.x, d.y);
    }
  });

  // All dots eaten: new wave, respawn dots, ghosts speed up
  if (dots.every(d => !d.alive)) {
    pacWave++;
    dots.forEach(d => d.alive = true);
    // Flash: brief particle burst at center
    for (let i = 0; i < 12; i++) {
      const ang = (i/12)*Math.PI*2, spd = 2+Math.random()*4;
      pacDissolveParticles.push({ x:window.innerWidth/2, y:window.innerHeight/2,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:40, size:2+Math.random()*2, ci:i%4 });
    }
  }

  // Ghost collision
  for (const g of ghosts) {
    if (Math.hypot(g.x - pac.x, g.y - pac.y) < PAC_R + GHOST_R * 0.72) {
      pacDeathX = pac.x; pacDeathY = pac.y;
      triggerPacDeath(); return;
    }
  }
}

function drawPacFrame() {
  pacCtx.clearRect(0, 0, pacCanvas.width, pacCanvas.height);
  const alpha = Math.min(pacEntryAlpha, 1);

  // Dissolve / wave particles
  pacDissolveParticles.forEach(p => {
    pacCtx.save(); pacCtx.globalAlpha = Math.max(0, p.life/60) * (pacDissolving ? 1 : alpha);
    pacCtx.fillStyle = CHROMA[p.ci];
    pacCtx.beginPath(); pacCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pacCtx.fill();
    pacCtx.restore();
  });

  if (pacDissolving) return;

  // Dots
  dots.filter(d => d.alive).forEach(d => {
    const pulse = 0.65 + 0.35*Math.sin(pacT*0.07 + d.x*0.008 + d.y*0.006);
    pacCtx.save(); pacCtx.globalAlpha = alpha * 0.6 * pulse;
    pacCtx.fillStyle = '#c4aad0';
    pacCtx.shadowColor = '#c4aad0'; pacCtx.shadowBlur = 7;
    pacCtx.beginPath(); pacCtx.arc(d.x, d.y, DOT_R * 0.6, 0, Math.PI*2); pacCtx.fill();
    pacCtx.restore();
  });

  // Ghosts
  ghosts.forEach(g => drawGhost(pacCtx, g.x, g.y, GHOST_R, g.notch, alpha));

  // Pacman
  drawPacman(pacCtx, pac.x, pac.y, PAC_R, pac.angle, pac.mouth, alpha);
}

function triggerPacDeath() {
  pacDissolving = true;
  soundDeath(); haptic('death');
  for (let i = 0; i < 28; i++) {
    const ang = (i/28)*Math.PI*2, spd = 1.5+Math.random()*3.5;
    pacDissolveParticles.push({
      x: pac.x, y: pac.y,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
      life: 55+Math.floor(Math.random()*20), size: 2+Math.random()*3, ci: i%4
    });
  }
  setTimeout(() => {
    clearInterval(pacLoop);
    pacActive = false;
    document.body.classList.remove('pac-active');
    pacCtx.clearRect(0, 0, pacCanvas.width, pacCanvas.height);
    launchFlappy(pacDeathX, pacDeathY, pacScore);
  }, 900);
}

function launchPacman(fromX, fromY, inheritScore) {
  document.body.classList.add('any-game-active');
  updateHUD();
  startCountdown(() => {
    document.body.classList.add('pac-active');
    pacCanvas.width = window.innerWidth; pacCanvas.height = window.innerHeight;
    initPacman(fromX, fromY, inheritScore);
    pacActive = true;
    pacLoop = setInterval(() => {
      if (!pacActive) return;
      pacEntryAlpha = Math.min(pacEntryAlpha + 0.025, 1);
      stepPacman(); drawPacFrame();
    }, 16);
    updateHUD();
  });
}
