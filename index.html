<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBES</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #ffffff;
  font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
  cursor: none;
}

#cursor {
  position: fixed; top: 0; left: 0;
  width: 5px; height: 5px;
  background: #000; border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
}

#bg {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
  background: #ffffff;
}

.grain {
  position: fixed; inset: -200%;
  width: 400%; height: 400%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.022; pointer-events: none; z-index: 1;
  animation: grain 9s steps(1) infinite;
}
@keyframes grain {
  0%  { transform:translate(0,0) }      10% { transform:translate(-4%,-9%) }
  20% { transform:translate(-14%,4%) }  30% { transform:translate(6%,-14%) }
  40% { transform:translate(-4%,18%) }  50% { transform:translate(-18%,9%) }
  60% { transform:translate(13%,4%) }   70% { transform:translate(0,13%) }
  80% { transform:translate(2%,32%) }   90% { transform:translate(-18%,9%) }
 100% { transform:translate(0,0) }
}

.line-top, .line-bottom {
  position: fixed; left: 0; right: 0; height: 1px;
  background: #000; z-index: 10; transform: scaleX(0);
  animation: line-in 1.4s cubic-bezier(0.77,0,0.18,1) forwards;
}
.line-top    { top: 0;    transform-origin: left;  animation-delay: 0.1s; }
.line-bottom { bottom: 0; transform-origin: right; animation-delay: 0.3s; }
@keyframes line-in { to { transform: scaleX(1); } }

.corner {
  position: fixed; z-index: 10;
  width: 14px; height: 14px;
  opacity: 0; animation: fade 0.7s ease 0.9s forwards;
}
.corner--tl { top:26px;    left:30px;  border-top:1px solid #000; border-left:1px solid #000; }
.corner--tr { top:26px;    right:30px; border-top:1px solid #000; border-right:1px solid #000; }
.corner--bl { bottom:26px; left:30px;  border-bottom:1px solid #000; border-left:1px solid #000; }
.corner--br { bottom:26px; right:30px; border-bottom:1px solid #000; border-right:1px solid #000; }

.logo-wrap {
  position: fixed;
  top: 50%; left: 50%;
  z-index: 5;
  opacity: 0;
  animation: logo-rise 1.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}
@keyframes logo-rise {
  from { opacity:0; transform:translate(-50%,-50%) translateY(10px); }
  to   { opacity:1; transform:translate(-50%,-50%) translateY(0); }
}
.logo-img {
  width: clamp(240px, 30vw, 420px);
  height: auto;
  display: block;
}

.top-text {
  position: fixed;
  top: 58px;
  left: 0; right: 0;
  text-align: center;
  z-index: 5;
  opacity: 0;
  animation: rise 1.4s cubic-bezier(0.22,1,0.36,1) 0.8s forwards;
}
.top-text p {
  font-size: clamp(9px, 1.05vw, 12px);
  font-weight: 400;
  letter-spacing: 0.22em;
  line-height: 2.5;
  text-transform: uppercase;
  color: #000;
}

.bottom-text {
  position: fixed;
  bottom: 58px;
  left: 0; right: 0;
  text-align: center;
  z-index: 5;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0;
  animation: rise 1.4s cubic-bezier(0.22,1,0.36,1) 1s forwards;
}
.bottom-text p {
  font-size: clamp(9px, 1.05vw, 12px);
  font-weight: 400;
  letter-spacing: 0.22em;
  line-height: 2.5;
  text-transform: uppercase;
  color: #000;
}

.reveal {
  margin-top: 20px;
  display: flex; align-items: center; gap: 16px;
  opacity: 0;
  animation: fade 1s ease 1.6s forwards;
}
.reveal::before, .reveal::after {
  content: ""; display: block;
  width: 22px; height: 1px;
  background: #000; opacity: 0.2;
}
.reveal span {
  font-size: 8px;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  text-indent: 0.42em;
  color: #000; font-weight: 400;
}

.meta {
  position: fixed; bottom: 26px; left: 0; right: 0;
  display: flex; justify-content: space-between;
  padding: 0 48px; z-index: 10;
  opacity: 0; animation: fade 1s ease 2s forwards;
}
.meta span {
  font-size: 6.5px; letter-spacing: 0.3em;
  text-transform: uppercase; text-indent: 0.3em;
  color: #000; opacity: 0.28;
}

@keyframes rise {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fade { to { opacity:1; } }

</style>
</head>

<canvas id="bg"></canvas>
<div class="grain"></div>

<div class="line-top"></div>
<div class="line-bottom"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="top-text">
  <p>WE CELEBRATE A JOURNEY OF GRIND,<br>
  OFFERING A FRESH PERSPECTIVE ON SELF-REALIZATION.</p>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, t = 0, layers = [];
let offBack, offMid, ctxBack, ctxMid;

function makeOff(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

function init() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const s = Math.min(W, H);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  offBack = makeOff(W, H);
  offMid  = makeOff(W, H);
  ctxBack = offBack.getContext('2d');
  ctxMid  = offMid.getContext('2d');

  // BACK — huge, slow, faint, blurred → distant planets
  const back = [
    { x:W*0.05, y:H*0.75, r:s*0.42, vx: 0.08, vy:-0.05, phase:0.0, lw:1.1, baseA:0.07, a:0 },
    { x:W*0.85, y:H*0.20, r:s*0.36, vx:-0.06, vy: 0.04, phase:2.1, lw:0.65, baseA:0.06, a:0 },
    { x:W*0.50, y:H*0.90, r:s*0.50, vx: 0.05, vy:-0.03, phase:3.8, lw:1.3, baseA:0.05, a:0 },
  ].map(o => ({ ...o, z:0 }));

  // MID — medium, slight blur
  const mid = [
    { x:W*0.12, y:H*0.22, r:s*0.22, vx: 0.14, vy: 0.09, phase:1.1, lw:0.65, baseA:0.13, a:0 },
    { x:W*0.78, y:H*0.65, r:s*0.17, vx:-0.12, vy:-0.10, phase:4.2, lw:0.4, baseA:0.12, a:0 },
    { x:W*0.40, y:H*0.08, r:s*0.19, vx: 0.11, vy: 0.13, phase:2.6, lw:0.65, baseA:0.11, a:0 },
    { x:W*0.92, y:H*0.50, r:s*0.14, vx:-0.10, vy: 0.08, phase:0.4, lw:0.35, baseA:0.13, a:0 },
  ].map(o => ({ ...o, z:1 }));

  // FRONT — small, sharp, fast
  const front = [
    { x:W*0.30, y:H*0.55, r:s*0.065, vx:-0.22, vy:-0.17, phase:1.5, lw:0.4, baseA:0.18, a:0 },
    { x:W*0.68, y:H*0.30, r:s*0.045, vx: 0.26, vy: 0.14, phase:3.3, lw:0.35, baseA:0.20, a:0 },
    { x:W*0.15, y:H*0.82, r:s*0.035, vx: 0.18, vy:-0.21, phase:5.1, lw:0.35, baseA:0.17, a:0 },
  ].map(o => ({ ...o, z:2 }));

  layers = [...back, ...mid, ...front];
}

// ── GLITCH / DISINTEGRATION ENGINE ──────────────────────────────────────────
// Each orb can enter a "glitch" state: the circle shatters into dashed arcs,
// displaced fragments, and static noise — then snaps back instantly as if
// nothing happened. Feels like a data corruption anomaly.
//
// glitch state machine per orb:
//   idle  → randomly triggers every 4–18s
//   active (lasts 18–40 frames) → draws disintegration
//   snap  → 1 frame hard cut back to normal

function scheduleGlitch(o) {
  // Only mid and front orbs glitch (back ones are too distant/subtle)
  if (o.z === 0) return;
  o.glitch      = 'idle';
  o.glitchTimer = Math.floor(240 + Math.random() * 900); // 4–18s at 60fps
  o.glitchDur   = Math.floor(18 + Math.random() * 22);   // 18–40 frames
  o.glitchAge   = 0;
  o.glitchSeed  = Math.random() * 1000;
}

function drawGlitchedOrb(o, targetCtx, r, alpha) {
  const p    = o.glitchAge / o.glitchDur;
  const cx   = o.x, cy = o.y;

  // The circle breaks into 2-3 clean arcs with a tiny gap offset — nothing more
  const numGaps = 2 + (Math.floor(o.glitchAge / 6) % 2); // 2 or 3 gaps, changes slowly
  let angle = o.glitchSeed % (Math.PI * 2);

  for (let i = 0; i < numGaps; i++) {
    const arcSpan = (Math.PI * 2 / numGaps) * (0.82 + Math.random() * 0.12);
    const gapSpan = (Math.PI * 2 / numGaps) - arcSpan;
    // Subtle radial jitter — barely moves, just enough to feel corrupted
    const dr = r * (Math.random() - 0.5) * 0.03;

    targetCtx.beginPath();
    targetCtx.arc(cx, cy, r + dr, angle, angle + arcSpan);
    targetCtx.strokeStyle = `rgba(220,0,0,${(0.7 + p * 0.3).toFixed(3)})`;
    targetCtx.lineWidth   = o.lw;
    targetCtx.stroke();

    angle += arcSpan + gapSpan;
  }
}

function drawOrbs(list, targetCtx, fadeSpd) {
  for (const o of list) {
    o.a = Math.min(1, o.a + fadeSpd);

    // Init glitch state on first draw
    if (o.glitch === undefined) scheduleGlitch(o);

    const breathe = Math.sin(t * 0.0004 * Math.PI * 2 + o.phase) * (o.r * 0.025);
    const r       = Math.max(1, o.r + breathe);
    const pulse   = 0.02 * Math.sin(t * 0.0006 * Math.PI * 2 + o.phase + 0.8);
    const alpha   = o.a * (o.baseA + pulse);

    // ── Glitch state machine ──
    if (o.glitch === 'idle') {
      o.glitchTimer--;
      if (o.glitchTimer <= 0) {
        o.glitch     = 'active';
        o.glitchAge  = 0;
        o.glitchSeed = Math.random() * 1000;
      }
    }

    if (o.glitch === 'active') {
      o.glitchAge++;
      // Always draw glitch on MAIN canvas (ctx) so color is never lost in blur compositing
      drawGlitchedOrb(o, ctx, r, 1.0);

      if (o.glitchAge >= o.glitchDur) {
        o.glitch = 'snap';
      }
    } else if (o.glitch === 'snap') {
      // One frame hard cut on main canvas — bright red flash then gone
      ctx.beginPath();
      ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(220,0,0,0.9)`;
      ctx.lineWidth   = o.lw * 1.5;
      ctx.stroke();
      scheduleGlitch(o);
    } else {
      // Normal draw on target (offscreen or main depending on layer)
      targetCtx.beginPath();
      targetCtx.arc(o.x, o.y, r, 0, Math.PI * 2);
      targetCtx.strokeStyle = `rgba(0,0,0,${Math.max(0.02, alpha).toFixed(3)})`;
      targetCtx.lineWidth   = o.lw;
      targetCtx.stroke();
    }

    // Drift
    o.x += o.vx;
    o.y += o.vy;
    const pad = r + 2;
    if (o.x < -pad)     o.x = W + pad;
    if (o.x > W + pad)  o.x = -pad;
    if (o.y < -pad)     o.y = H + pad;
    if (o.y > H + pad)  o.y = -pad;
  }
}

function draw() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  t++;

  // BACK → blur 2.5px
  ctxBack.clearRect(0, 0, W, H);
  drawOrbs(layers.filter(o => o.z === 0), ctxBack, 0.005);
  ctx.save();
  ctx.filter = 'blur(2.5px)';
  ctx.drawImage(offBack, 0, 0);
  ctx.restore();

  // MID → blur 0.8px
  ctxMid.clearRect(0, 0, W, H);
  drawOrbs(layers.filter(o => o.z === 1), ctxMid, 0.008);
  ctx.save();
  ctx.filter = 'blur(0.8px)';
  ctx.drawImage(offMid, 0, 0);
  ctx.restore();

  // FRONT → sharp
  ctx.filter = 'none';
  drawOrbs(layers.filter(o => o.z === 2), ctx, 0.012);

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.68);
  vig.addColorStop(0,   'rgba(255,255,255,0)');
  vig.addColorStop(0.6, 'rgba(255,255,255,0)');
  vig.addColorStop(1,   'rgba(170,167,163,0.10)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Central glow
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W,H)*0.35);
  glow.addColorStop(0, 'rgba(252,250,247,0.18)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

window.addEventListener('resize', init);
init();
draw();
</script>
