// ─── FLAPPY BIRD ──────────────────────────────────────────────────────────────
const flpCanvas = document.getElementById('flp-canvas');
const flpCtx    = flpCanvas.getContext('2d');

const FLP_R     = 12;   // bird radius
const GRAVITY   = 0.32;
const FLAP_VEL  = -6.5;
const PIPE_W    = 28;
const PIPE_GAP  = 180;
const PIPE_SPD  = 2.4;

let flpActive   = false;
let flpLoop     = null;
let flpBird, flpPipes, flpScore, flpT;
let flpDissolving = false;
let flpDissParticles = [];
let flpAlpha    = 0;

// Bird: notched circle tilted in direction of velocity (same family as pac/ghost)
function drawBird(ctx, x, y, r, vy, alpha) {
  const tilt = Math.max(-0.7, Math.min(0.7, vy * 0.09));
  drawPacman(ctx, x, y, r, tilt, 0.55, alpha); // mouth stays open — bird beak
}

// Pipe: two thin stroke rectangles with rounded caps + chromatic gradient
function drawPipe(ctx, px, topH, botY, alpha) {
  // Same aesthetic as pacman walls: stroke lines with chromatic gradient
  const H = flpCanvas.height;
  ctx.save(); ctx.globalAlpha = alpha * 0.65;
  ctx.shadowColor = '#a0c4d8'; ctx.shadowBlur = 10;
  ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  function pg(y1, y2) {
    const g = ctx.createLinearGradient(px, y1, px + PIPE_W, y2);
    g.addColorStop(0, '#c8a97e'); g.addColorStop(0.33, '#a0c4d8');
    g.addColorStop(0.66, '#c4aad0'); g.addColorStop(1, '#7ec8b4'); return g;
  }
  ctx.strokeStyle = pg(0, topH);
  ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, topH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px + PIPE_W, 0); ctx.lineTo(px + PIPE_W, topH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px, topH); ctx.lineTo(px + PIPE_W, topH); ctx.stroke();
  ctx.strokeStyle = pg(botY, H);
  ctx.beginPath(); ctx.moveTo(px, botY); ctx.lineTo(px, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px + PIPE_W, botY); ctx.lineTo(px + PIPE_W, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px, botY); ctx.lineTo(px + PIPE_W, botY); ctx.stroke();
  ctx.restore();
}

function initFlappy(startX, startY, inheritScore) {
  flpCanvas.width  = window.innerWidth;
  flpCanvas.height = window.innerHeight;
  flpT = 0; flpAlpha = 0;
  flpScore = inheritScore || 0;
  flpDissolving = false; flpDissParticles = [];

  flpBird = { x: startX || window.innerWidth * 0.28, y: startY || window.innerHeight * 0.5, vy: 0 };
  flpPipes = [];
  // First pipe further away to give time to react
  spawnPipe(flpCanvas.width + 120);
  updateScore();
}

function spawnPipe(x) {
  const H = flpCanvas.height;
  const minH = 70, maxH = H - PIPE_GAP - 70;
  const topH = minH + Math.random() * (maxH - minH);
  flpPipes.push({ x, topH, botY: topH + PIPE_GAP, passed: false });
}

function stepFlappy() {
  if (flpDissolving) {
    flpDissParticles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life--; });
    flpDissParticles = flpDissParticles.filter(p => p.life > 0);
    return;
  }
  flpT++;

  // Bird physics
  flpBird.vy += GRAVITY;
  flpBird.y  += flpBird.vy;

  // Ceiling / floor death
  if (flpBird.y - FLP_R < 0 || flpBird.y + FLP_R > flpCanvas.height) {
    triggerFlpDeath(); return;
  }

  // Move pipes, spawn new ones
  const interval = Math.max(220, 320 - flpScore * 4); // tighten gap over time
  flpPipes.forEach(p => p.x -= PIPE_SPD + flpScore * 0.03);
  flpPipes = flpPipes.filter(p => p.x + PIPE_W > -10);
  const last = flpPipes[flpPipes.length - 1];
  if (!last || last.x < flpCanvas.width - interval) spawnPipe(flpCanvas.width + 20);

  // Score: passed a pipe
  flpPipes.forEach(p => {
    if (!p.passed && p.x + PIPE_W < flpBird.x) {
      p.passed = true; flpScore++; globalScore++; updateScore();
      spawnFoodParticles(flpBird.x, flpBird.y);
    }
  });

  // Pipe collision
  for (const p of flpPipes) {
    if (flpBird.x + FLP_R*0.7 > p.x && flpBird.x - FLP_R*0.7 < p.x + PIPE_W) {
      if (flpBird.y - FLP_R < p.topH || flpBird.y + FLP_R > p.botY) {
        triggerFlpDeath(); return;
      }
    }
  }
}

function drawFlpFrame() {
  flpCtx.clearRect(0, 0, flpCanvas.width, flpCanvas.height);
  const alpha = Math.min(flpAlpha, 1);

  flpDissParticles.forEach(p => {
    flpCtx.save(); flpCtx.globalAlpha = Math.max(0,p.life/60);
    flpCtx.fillStyle = CHROMA[p.ci];
    flpCtx.beginPath(); flpCtx.arc(p.x,p.y,p.size,0,Math.PI*2); flpCtx.fill();
    flpCtx.restore();
  });
  if (flpDissolving) return;

  flpPipes.forEach(p => drawPipe(flpCtx, p.x, p.topH, p.botY, alpha));
  drawBird(flpCtx, flpBird.x, flpBird.y, FLP_R, flpBird.vy, alpha);
}

function triggerFlpDeath() {
  flpDissolving = true;
  soundDeath(); haptic('death');
  for (let i = 0; i < 24; i++) {
    const ang = (i/24)*Math.PI*2, spd = 1.5+Math.random()*3;
    flpDissParticles.push({
      x: flpBird.x, y: flpBird.y,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
      life: 55+Math.floor(Math.random()*20), size: 2+Math.random()*3, ci: i%4
    });
  }
  setTimeout(stopFlappy, 900);
}

function stopFlappy() {
  flpActive = false;
  document.body.classList.remove('flp-active', 'any-game-active');
  clearInterval(flpLoop);
  flpCtx.clearRect(0, 0, flpCanvas.width, flpCanvas.height);
  snakeBtn.style.opacity = ''; snakeBtn.style.pointerEvents = '';
  const scoreEl = document.getElementById('snake-score');
  if (scoreEl) { scoreEl.textContent = '0'; scoreEl.style.opacity = '0'; }
  setTimeout(() => { if (scoreEl) scoreEl.style.opacity = ''; }, 600);
  updateHUD(true);
}

function launchFlappy(fromX, fromY, inheritScore) {
  document.body.classList.add('any-game-active');
  updateHUD();
  startCountdown(() => {
    document.body.classList.add('flp-active');
    flpCanvas.width = window.innerWidth; flpCanvas.height = window.innerHeight;
    initFlappy(fromX, fromY, inheritScore);
    flpActive = true;
    flpLoop = setInterval(() => {
      if (!flpActive) return;
      flpAlpha = Math.min(flpAlpha + 0.025, 1);
      stepFlappy(); drawFlpFrame();
    }, 16);
    updateHUD();
  });
}

// Flap: tap / click / space / up arrow
function doFlap() { if (flpActive && !flpDissolving) { flpBird.vy = FLAP_VEL; soundFlap(); haptic('flap'); } }
flpCanvas.addEventListener('touchstart', e => { doFlap(); e.preventDefault(); }, { passive: false });
flpCanvas.addEventListener('mousedown', e => { if (flpActive) doFlap(); });
document.addEventListener('keydown', e => {
  if (!flpActive) return;
  if (e.code === 'Space' || e.key === 'ArrowUp') { doFlap(); e.preventDefault(); }
});


// ─── GAME GOAL & HUD ──────────────────────────────────────────────────────────
const GAME_GOAL = 20; // total score across all three games to trigger fire

function updateHUD(reset) {
  const hud = document.getElementById('game-hud');
  if (reset) { if (hud) hud.style.display = 'none'; return; }
  if (hud) { hud.style.display = 'block'; hud.textContent = '✦ ' + globalScore + ' / ' + GAME_GOAL; }
  if (globalScore >= GAME_GOAL) triggerFireMode();
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function startCountdown(callback) {
  const el = document.getElementById('countdown');
  if (!el) { callback(); return; }
  document.body.classList.add('counting');
  let n = 3;
  el.style.display = 'block';
  // sizes: 3 is smallest, 1 is largest — grows each digit
  const sizes = { 3: '0.55', 2: '0.75', 1: '1.0' };
  function tick() {
    el.textContent = n;
    // Start from current size scaled down slightly, animate to target
    const scaleTarget = sizes[n];
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -50%) scale(' + (parseFloat(scaleTarget) * 0.75) + ')';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transition = 'opacity 0.3s ease, transform 0.55s cubic-bezier(0.22,1,0.36,1)';
      el.style.opacity = '0.12';
      el.style.transform = 'translate(-50%, -50%) scale(' + scaleTarget + ')';
    }));
    if (n > 1) { n--; setTimeout(tick, 850); }
    else {
      setTimeout(() => {
        el.style.transition = 'opacity 0.35s ease';
        el.style.opacity = '0';
        setTimeout(() => { el.style.display = 'none'; document.body.classList.remove('counting'); callback(); }, 380);
      }, 700);
    }
  }
  tick();
}

// ─── CHROMATIC FIRE ───────────────────────────────────────────────────────────
const fireCanvas = document.getElementById('fire-canvas');
const fireCtx    = fireCanvas.getContext('2d');
let fireActive   = false;
let fireParticles = [];
let fireRaf;

function triggerFireMode() {
  if (fireActive) return;
  fireActive = true;
  fireSurgeT = 0;
  document.body.classList.add('fire-active');
  fireCanvas.width  = window.innerWidth;
  fireCanvas.height = window.innerHeight;
  if (snakeActive) { clearInterval(snakeLoop); snakeActive = false; snakeCtx.clearRect(0,0,snakeCanvas.width,snakeCanvas.height); }
  if (pacActive)   { clearInterval(pacLoop);   pacActive   = false; pacCtx.clearRect(0,0,pacCanvas.width,pacCanvas.height); }
  if (flpActive)   { clearInterval(flpLoop);   flpActive   = false; flpCtx.clearRect(0,0,flpCanvas.width,flpCanvas.height); }
  document.body.classList.remove('snake-active','pac-active','flp-active','any-game-active');
  const scoreEl = document.getElementById('snake-score');
  if (scoreEl) { scoreEl.style.opacity = '0'; }
  const hud = document.getElementById('game-hud');
  if (hud) hud.style.display = 'none';
  snakeBtn.style.opacity = ''; snakeBtn.style.pointerEvents = '';
  setTimeout(() => { fireCanvas.classList.add('fire-visible'); }, 100);
  // Fade out after 7s (keep canvas alive for rAF, just CSS opacity)
  setTimeout(() => {
    fireCanvas.style.transition = 'opacity 2s ease';
    fireCanvas.style.opacity = '0';
    setTimeout(() => {
      fireActive = false;
      cancelAnimationFrame(fireRaf);
      document.body.classList.remove('fire-active');
      fireCanvas.classList.remove('fire-visible');
      fireCanvas.style.transition = '';
      fireCanvas.style.opacity = '';
    }, 2100);
  }, 7000);
  animateFire();
}

// Chromatic wave surge — multiple layered sine waves rising from bottom,
// same palette as the chromatic wave Easter egg, but permanent and dramatic.
let fireSurgeT = 0;
let fireSurgeActive = true; // stays forever

function animateFire() {
  if (!fireActive) return;
  fireCanvas.width = window.innerWidth; fireCanvas.height = window.innerHeight;
  const W = fireCanvas.width, H = fireCanvas.height;
  fireSurgeT++;

  fireCtx.clearRect(0, 0, W, H);

  // 7 wave layers — each slightly different freq/speed/opacity
  const layers = [
    { freq:0.018, speed:0.4,  amp:0.22, yBase:0.82, lw:1.8, alpha:0.38 },
    { freq:0.025, speed:0.55, amp:0.18, yBase:0.74, lw:1.4, alpha:0.30 },
    { freq:0.014, speed:0.3,  amp:0.25, yBase:0.88, lw:2.2, alpha:0.45 },
    { freq:0.030, speed:0.7,  amp:0.14, yBase:0.66, lw:1.2, alpha:0.22 },
    { freq:0.010, speed:0.22, amp:0.28, yBase:0.92, lw:2.8, alpha:0.50 },
    { freq:0.022, speed:0.48, amp:0.16, yBase:0.70, lw:1.0, alpha:0.18 },
    { freq:0.016, speed:0.35, amp:0.20, yBase:0.78, lw:1.6, alpha:0.28 },
  ];

  layers.forEach((lyr, li) => {
    fireCtx.save();
    // Chromatic gradient sliding horizontally — same as the wave Easter egg
    const shift = (fireSurgeT * lyr.speed * 2) % W;
    const grd = fireCtx.createLinearGradient(-shift, 0, W * 2 - shift, 0);
    grd.addColorStop(0,    '#c8a97e');
    grd.addColorStop(0.25, '#a0c4d8');
    grd.addColorStop(0.50, '#c4aad0');
    grd.addColorStop(0.75, '#7ec8b4');
    grd.addColorStop(1.0,  '#c8a97e');

    fireCtx.strokeStyle = grd;
    fireCtx.lineWidth   = lyr.lw;
    fireCtx.globalAlpha = lyr.alpha;
    fireCtx.shadowColor = '#a0c4d8';
    fireCtx.shadowBlur  = 12 + li * 2;
    fireCtx.lineCap     = 'round';

    // Draw filled wave from this layer's baseline to bottom of screen
    fireCtx.beginPath();
    for (let px = 0; px <= W; px += 3) {
      const wave1 = Math.sin(px * lyr.freq + fireSurgeT * lyr.speed) * lyr.amp * H;
      const wave2 = Math.sin(px * lyr.freq * 0.6 + fireSurgeT * lyr.speed * 1.3 + li) * lyr.amp * H * 0.4;
      const py    = lyr.yBase * H + wave1 + wave2;
      if (px === 0) fireCtx.moveTo(px, py);
      else fireCtx.lineTo(px, py);
    }
    // Close path to bottom to fill
    fireCtx.lineTo(W, H);
    fireCtx.lineTo(0, H);
    fireCtx.closePath();

    // Fill with very subtle tint
    const fillGrd = fireCtx.createLinearGradient(0, lyr.yBase * H - lyr.amp*H, 0, H);
    fillGrd.addColorStop(0, 'rgba(160,196,216,0.0)');
    fillGrd.addColorStop(1, 'rgba(200,169,126,0.08)');
    fireCtx.fillStyle   = fillGrd;
    fireCtx.globalAlpha = lyr.alpha * 0.5;
    fireCtx.fill();

    // Draw stroke on top of fill
    fireCtx.globalAlpha = lyr.alpha;
    fireCtx.beginPath();
    for (let px = 0; px <= W; px += 3) {
      const wave1 = Math.sin(px * lyr.freq + fireSurgeT * lyr.speed) * lyr.amp * H;
      const wave2 = Math.sin(px * lyr.freq * 0.6 + fireSurgeT * lyr.speed * 1.3 + li) * lyr.amp * H * 0.4;
      const py    = lyr.yBase * H + wave1 + wave2;
      if (px === 0) fireCtx.moveTo(px, py);
      else fireCtx.lineTo(px, py);
    }
    fireCtx.stroke();
    fireCtx.restore();
  });

  // Subtle vertical streaks rising — like aurora
  if (fireSurgeT % 4 === 0) {
    fireParticles.push({
      x: Math.random() * W,
      y: H,
      vy: -(0.8 + Math.random() * 2.5),
      vx: (Math.random() - 0.5) * 0.4,
      len: 20 + Math.random() * 60,
      alpha: 0.15 + Math.random() * 0.25,
      hueIdx: Math.floor(Math.random() * 4),
      life: 1.0
    });
  }

  const streakColors = ['#c8a97e','#a0c4d8','#c4aad0','#7ec8b4'];
  fireParticles.forEach(p => {
    p.y  += p.vy; p.x += p.vx;
    p.life -= 0.007;
    if (p.life <= 0) return;
    const a = p.life * p.alpha;
    fireCtx.save();
    fireCtx.globalAlpha = a;
    fireCtx.strokeStyle = streakColors[p.hueIdx];
    fireCtx.lineWidth   = 0.8;
    fireCtx.shadowColor = streakColors[p.hueIdx]; fireCtx.shadowBlur = 8;
    fireCtx.beginPath();
    fireCtx.moveTo(p.x, p.y);
    fireCtx.lineTo(p.x + p.vx * 8, p.y - p.len);
    fireCtx.stroke();
    fireCtx.restore();
  });
  fireParticles = fireParticles.filter(p => p.life > 0 && p.y > -100);

  fireRaf = requestAnimationFrame(animateFire);
}

// ─── PACMAN: WALLS + GHOST SPAWNING ──────────────────────────────────────────
// Rewrite initPacman to add walls and ghost spawning
const _origInitPacman = initPacman;

// Wall segments: array of {x1,y1,x2,y2} in normalised coords (0-1)
function getPacWalls(W, H) {
  const m = 0.05; // margin from edges
  return [
    // Horizontal walls
    { x1:0.20, y1:0.25, x2:0.40, y2:0.25 },
    { x1:0.60, y1:0.25, x2:0.80, y2:0.25 },
    { x1:0.20, y1:0.75, x2:0.40, y2:0.75 },
    { x1:0.60, y1:0.75, x2:0.80, y2:0.75 },
    { x1:0.35, y1:0.50, x2:0.65, y2:0.50 },
    // Vertical walls
    { x1:0.25, y1:0.35, x2:0.25, y2:0.65 },
    { x1:0.75, y1:0.35, x2:0.75, y2:0.65 },
  ].map(w => ({
    x1: w.x1*W, y1: w.y1*H,
    x2: w.x2*W, y2: w.y2*H
  }));
}

// Override initPacman to add walls, ghost spawner, and remove dot shimmer
initPacman = function(startX, startY, inheritScore) {
  _origInitPacman(startX, startY, inheritScore);
  const W = pacCanvas.width, H = pacCanvas.height;
  pacWalls = getPacWalls(W, H);

  // Safe spawn: find a position not near any wall
  // Try center first, then spiral outward
  const candidates = [
    {x: W*0.5, y: H*0.5},
    {x: W*0.15, y: H*0.5}, {x: W*0.85, y: H*0.5},
    {x: W*0.5, y: H*0.15}, {x: W*0.5, y: H*0.85},
    {x: W*0.15, y: H*0.15}, {x: W*0.85, y: H*0.85},
  ];
  for (const c of candidates) {
    if (!isNearWall(c.x, c.y, W, H, PAC_R + 12)) {
      pac.x = c.x; pac.y = c.y; break;
    }
  }

  // Remove dots that overlap walls
  dots = dots.filter(d => !isNearWall(d.x, d.y, W, H, 10));

  // Ghost spawn schedule
  pacMaxGhosts = 4;
  pacGhostTimer = 0;
  pacGhostInterval = 480;
};

let pacWalls = [];
let pacMaxGhosts = 4;
let pacGhostTimer = 0;
let pacGhostInterval = 480;

function isNearWall(x, y, W, H, margin) {
  for (const w of pacWalls) {
    if (w.x1 === w.x2) { // vertical
      if (Math.abs(x - w.x1) < margin && y >= w.y1 - margin && y <= w.y2 + margin) return true;
    } else { // horizontal
      if (Math.abs(y - w.y1) < margin && x >= w.x1 - margin && x <= w.x2 + margin) return true;
    }
  }
  return false;
}

function wallCollides(px, py, r, W, H) {
  for (const w of pacWalls) {
    // AABB vs segment
    if (w.x1 === w.x2) { // vertical segment
      const minY = Math.min(w.y1, w.y2), maxY = Math.max(w.y1, w.y2);
      if (px + r > w.x1 - 4 && px - r < w.x1 + 4 && py + r > minY && py - r < maxY) return true;
    } else { // horizontal segment
      const minX = Math.min(w.x1, w.x2), maxX = Math.max(w.x1, w.x2);
      if (py + r > w.y1 - 4 && py - r < w.y1 + 4 && px + r > minX && px - r < maxX) return true;
    }
  }
  return false;
}

// Override stepPacman to add wall collision, ghost spawning, no dot shimmer
const _origStepPacman = stepPacman;
stepPacman = function() {
  if (pacDissolving) { _origStepPacman(); return; }
  pacT++;

  // Move pacman — bounce off walls AND screen edges
  const nx = pac.x + pac.ndx, ny = pac.y + pac.ndy;
  const W = pacCanvas.width, H = pacCanvas.height;
  let blocked = false;
  if (wallCollides(nx, pac.y, PAC_R, W, H)) { pac.ndx *= -1; blocked = true; }
  if (wallCollides(pac.x, ny, PAC_R, W, H)) { pac.ndy *= -1; blocked = true; }
  pac.x += pac.ndx; pac.y += pac.ndy;
  if (pac.x - PAC_R < 0) { pac.ndx = Math.abs(pac.ndx); pac.x = PAC_R + 1; }
  if (pac.x + PAC_R > W) { pac.ndx = -Math.abs(pac.ndx); pac.x = W - PAC_R - 1; }
  if (pac.y - PAC_R < 0) { pac.ndy = Math.abs(pac.ndy); pac.y = PAC_R + 1; }
  if (pac.y + PAC_R > H) { pac.ndy = -Math.abs(pac.ndy); pac.y = H - PAC_R - 1; }
  if (Math.abs(pac.ndx) > 0.1 || Math.abs(pac.ndy) > 0.1)
    pac.angle = Math.atan2(pac.ndy, pac.ndx);
  pac.mouth += 0.13 * pac.mouthDir;
  if (pac.mouth > 1) { pac.mouth = 1; pac.mouthDir = -1; }
  if (pac.mouth < 0) { pac.mouth = 0; pac.mouthDir = 1; }

  // Ghost spawn
  pacGhostTimer++;
  if (pacGhostTimer >= pacGhostInterval && ghosts.length < pacMaxGhosts + Math.floor(pacWave * 1.5)) {
    pacGhostTimer = 0;
    const spawnPoints = [
      {x:80,y:80},{x:W-80,y:80},{x:80,y:H-80},{x:W-80,y:H-80},
      {x:W/2,y:60},{x:60,y:H/2},{x:W-60,y:H/2},{x:W/2,y:H-60}
    ];
    const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
    const roles = ['hunter','predictor','guard','ambusher'];
    ghosts.push({ x:sp.x, y:sp.y, notch:0, vx:0, vy:0,
      phase: Math.random()*Math.PI*2,
      role: roles[ghosts.length % 4],
      spd: 0.65 + Math.random()*0.4 + pacWave*0.12
    });
  }

  // Ghost AI + wall collision
  const waveSpd = 1 + pacWave * 0.15;
  ghosts.forEach((g, i) => {
    let tx, ty;
    const ahead = 55;
    if (g.role === 'hunter')    { tx = pac.x; ty = pac.y; }
    else if (g.role === 'predictor') { tx = pac.x + pac.ndx*ahead; ty = pac.y + pac.ndy*ahead; }
    else if (g.role === 'guard') {
      const corners = [{x:80,y:80},{x:W-80,y:80},{x:80,y:H-80},{x:W-80,y:H-80}];
      const c = corners[(Math.floor(pacT/300)+i)%4];
      tx = Math.hypot(pac.x-g.x,pac.y-g.y) < 220 ? pac.x : c.x;
      ty = Math.hypot(pac.x-g.x,pac.y-g.y) < 220 ? pac.y : c.y;
    } else {
      tx = Math.hypot(pac.x-g.x,pac.y-g.y) < 280 ? pac.x : g.x+Math.cos(g.phase*0.7)*100;
      ty = Math.hypot(pac.x-g.x,pac.y-g.y) < 280 ? pac.y : g.y+Math.sin(g.phase*1.1)*80;
    }
    const dx = tx-g.x, dy = ty-g.y, dist = Math.hypot(dx,dy)||1;
    const spd = g.spd * waveSpd;
    const ngx = g.x + (dx/dist)*spd, ngy = g.y;
    const ngy2 = g.y + (dy/dist)*spd;
    g.x = wallCollides(ngx, g.y, GHOST_R, W, H) ? g.x : ngx;
    g.y = wallCollides(g.x, ngy2, GHOST_R, W, H) ? g.y : ngy2;
    g.vx = g.x - (g.x-(dx/dist)*spd);
    g.vy = g.y - (g.y-(dy/dist)*spd);
    if (g.x < GHOST_R) g.x = GHOST_R;
    if (g.x > W-GHOST_R) g.x = W-GHOST_R;
    if (g.y < GHOST_R) g.y = GHOST_R;
    if (g.y > H-GHOST_R) g.y = H-GHOST_R;
    if (Math.abs(dx)>0.1||Math.abs(dy)>0.1) g.notch = Math.atan2(dy,dx);
    g.phase += 0.025;
  });

  // Eat dots (no shimmer handled in draw)
  dots.forEach(d => {
    if (!d.alive) return;
    if (Math.hypot(d.x-pac.x, d.y-pac.y) < PAC_R+DOT_R+2) {
      d.alive = false; pacScore++; pacDotEaten++;
      soundEat();
      if (pacDotEaten % 3 === 0) { globalScore++; haptic('score'); }
      updateScore();
      spawnFoodParticles(d.x, d.y);
    }
  });

  if (dots.every(d => !d.alive)) {
    pacWave++;
    dots.forEach(d => d.alive = true);
    for (let i=0;i<12;i++) {
      const ang=(i/12)*Math.PI*2,spd=2+Math.random()*4;
      pacDissolveParticles.push({x:W/2,y:H/2,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:40,size:2+Math.random()*2,ci:i%4});
    }
  }

  for (const g of ghosts) {
    if (Math.hypot(g.x-pac.x, g.y-pac.y) < PAC_R+GHOST_R*0.72) {
      pacDeathX = pac.x; pacDeathY = pac.y; triggerPacDeath(); return;
    }
  }
};

// Override drawPacFrame to draw walls + no shimmer on dots
const _origDrawPacFrame = drawPacFrame;
drawPacFrame = function() {
  pacCtx.clearRect(0, 0, pacCanvas.width, pacCanvas.height);
  const alpha = Math.min(pacEntryAlpha, 1);

  pacDissolveParticles.forEach(p => {
    pacCtx.save(); pacCtx.globalAlpha = Math.max(0,p.life/60)*(pacDissolving?1:alpha);
    pacCtx.fillStyle = CHROMA[p.ci];
    pacCtx.beginPath(); pacCtx.arc(p.x,p.y,p.size,0,Math.PI*2); pacCtx.fill(); pacCtx.restore();
  });
  if (pacDissolving) return;

  // Walls
  pacWalls.forEach(w => {
    pacCtx.save(); pacCtx.globalAlpha = alpha * 0.55;
    pacCtx.strokeStyle = chrGrad(pacCtx, (w.x1+w.x2)/2, (w.y1+w.y2)/2, Math.max(Math.abs(w.x2-w.x1),50));
    pacCtx.lineWidth = 1.5; pacCtx.lineCap = 'round';
    pacCtx.shadowColor = '#a0c4d8'; pacCtx.shadowBlur = 8;
    pacCtx.beginPath(); pacCtx.moveTo(w.x1,w.y1); pacCtx.lineTo(w.x2,w.y2); pacCtx.stroke();
    pacCtx.restore();
  });

  // Dots — static, no shimmer
  dots.filter(d=>d.alive).forEach(d => {
    pacCtx.save(); pacCtx.globalAlpha = alpha * 0.55;
    pacCtx.fillStyle = '#c4aad0';
    pacCtx.shadowColor = '#c4aad0'; pacCtx.shadowBlur = 5;
    pacCtx.beginPath(); pacCtx.arc(d.x,d.y,DOT_R*0.6,0,Math.PI*2); pacCtx.fill();
    pacCtx.restore();
  });

  ghosts.forEach(g => drawGhost(pacCtx,g.x,g.y,GHOST_R,g.notch,alpha));
  drawPacman(pacCtx,pac.x,pac.y,PAC_R,pac.angle,pac.mouth,alpha);
};

// ─── EAGLE (replaces Pacman shape in Flappy) ──────────────────────────────────
// Eagle: minimalist stroke — two arcs for swept wings + small circle head
// Wings: flat V when gliding, angled V when flapping up
function drawEagle(ctx, x, y, vy, alpha) {
  const tilt = Math.max(-0.25, Math.min(0.20, vy * 0.032));
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  ctx.globalAlpha = alpha;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const S = 1.55;

  // ── Gradients ────────────────────────────────────────────────────────────
  const gBody = ctx.createLinearGradient(-14*S, -12*S, 14*S, 9*S);
  gBody.addColorStop(0,    '#a0c4d8');
  gBody.addColorStop(0.45, '#c4aad0');
  gBody.addColorStop(1,    '#c8a97e');

  const gBeak = ctx.createLinearGradient(9*S, -9*S, 22*S, 6*S);
  gBeak.addColorStop(0, '#c8b97e');
  gBeak.addColorStop(1, '#a09080');

  ctx.shadowColor = '#a0c4d8';
  ctx.shadowBlur  = 14;

  // ── HEAD SILHOUETTE — one clean closed path ───────────────────────────────
  // Flat crown → sweeping nape → neck base → chin → beak junction
  ctx.beginPath();
  ctx.moveTo(-3*S, -16*S);                                      // crown top
  ctx.bezierCurveTo( 3*S, -17*S,  9*S, -14*S, 11*S,  -9*S);   // forehead to beak root
  ctx.bezierCurveTo(12*S,  -5*S, 11*S,   1*S,  9*S,   5*S);   // chin
  ctx.bezierCurveTo( 4*S,  10*S, -4*S,  12*S,-10*S,   8*S);   // throat
  ctx.bezierCurveTo(-16*S,  4*S,-17*S,  -4*S,-14*S, -10*S);   // nape
  ctx.bezierCurveTo(-11*S,-14*S, -7*S, -16*S, -3*S, -16*S);   // back to crown
  ctx.closePath();
  ctx.fillStyle = gBody;
  ctx.globalAlpha = alpha * 0.88;
  ctx.fill();

  // Underside shadow for volume
  ctx.beginPath();
  ctx.moveTo(-10*S, 8*S);
  ctx.bezierCurveTo(-4*S, 12*S, 4*S, 10*S, 9*S, 5*S);
  ctx.bezierCurveTo(6*S, 3*S, 0, 2*S, -5*S, 4*S);
  ctx.bezierCurveTo(-8*S, 5*S, -10*S, 7*S, -10*S, 8*S);
  ctx.closePath();
  ctx.fillStyle = 'rgba(40,30,60,0.22)';
  ctx.globalAlpha = alpha * 0.7;
  ctx.fill();

  // ── BEAK — the eagle's signature ─────────────────────────────────────────
  // Upper mandible: long, curves decisively downward at tip
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(11*S, -9*S);                                       // beak root top
  ctx.bezierCurveTo(19*S, -10*S, 24*S, -5*S, 23*S,  1*S);     // upper ridge
  ctx.bezierCurveTo(22*S,  4*S,  19*S,  6*S, 17*S,  5*S);     // hook outer
  ctx.bezierCurveTo(15*S,  4*S,  14*S,  2*S, 13*S,  0);       // hook inner
  ctx.bezierCurveTo(12*S, -2*S,  11*S, -5*S, 11*S, -9*S);     // back to root
  ctx.closePath();
  ctx.fillStyle = gBeak;
  ctx.globalAlpha = alpha * 0.95;
  ctx.fill();

  // Lower mandible — simple straight line, much shorter
  ctx.globalAlpha = alpha * 0.75;
  ctx.beginPath();
  ctx.moveTo(9*S, 5*S);
  ctx.bezierCurveTo(12*S, 4*S, 14*S, 5*S, 14*S, 6*S);
  ctx.bezierCurveTo(13*S, 7*S, 11*S, 7*S, 9*S, 5*S);
  ctx.closePath();
  ctx.fillStyle = gBeak;
  ctx.fill();

  // Beak ridge highlight
  ctx.globalAlpha = alpha * 0.4;
  ctx.beginPath();
  ctx.moveTo(11*S, -9*S);
  ctx.bezierCurveTo(19*S, -10*S, 24*S, -5*S, 23*S, 1*S);
  ctx.strokeStyle = 'rgba(255,245,220,0.55)';
  ctx.lineWidth = 0.55;
  ctx.stroke();

  // ── BROW RIDGE — flat horizontal overhang above eye ──────────────────────
  ctx.globalAlpha = alpha * 0.85;
  ctx.beginPath();
  ctx.moveTo(-1*S, -11*S);
  ctx.bezierCurveTo( 2*S, -13*S,  6*S, -13*S,  9*S, -11*S);
  ctx.bezierCurveTo( 7*S, -10*S,  3*S, -10*S, -1*S, -11*S);
  ctx.closePath();
  ctx.fillStyle = 'rgba(25,15,40,0.45)';
  ctx.fill();

  // ── EYE — large, dark, commanding ────────────────────────────────────────
  ctx.globalAlpha = alpha;
  const ex = 4*S, ey = -6*S, er = 3.6*S;
  // Sclera
  ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(235,228,215,0.96)'; ctx.fill();
  // Iris
  const iris = ctx.createRadialGradient(ex-0.4*S, ey-0.4*S, 0.2*S, ex, ey, er*0.82);
  iris.addColorStop(0,   '#c8d8e8');
  iris.addColorStop(0.5, '#7090b0');
  iris.addColorStop(1,   '#1a2030');
  ctx.beginPath(); ctx.arc(ex, ey, er*0.82, 0, Math.PI*2);
  ctx.fillStyle = iris; ctx.fill();
  // Pupil
  ctx.beginPath(); ctx.arc(ex+0.2*S, ey, er*0.38, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(5,5,10,0.97)'; ctx.fill();
  // Catchlight
  ctx.beginPath(); ctx.arc(ex-0.9*S, ey-1.1*S, 0.6*S, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();

  ctx.restore();
}

  // Override position to left side
  flpBird.x = window.innerWidth * 0.18;
  flpBird.y = window.innerHeight * 0.5;

// Make gravity lighter
// Override stepFlappy for lighter physics + score HUD update
const _origStepFlappy = stepFlappy;
stepFlappy = function() {
  if (flpDissolving) { _origStepFlappy(); return; }
  flpT++;
  // Lighter gravity
  flpBird.vy += 0.22;  // was 0.32
  flpBird.vy = Math.min(flpBird.vy, 7); // terminal velocity cap
  flpBird.y  += flpBird.vy;

  if (flpBird.y - FLP_R < 0 || flpBird.y + FLP_R > flpCanvas.height) {
    triggerFlpDeath(); return;
  }

  const interval = Math.max(240, 340 - flpScore * 4);
  flpPipes.forEach(p => p.x -= PIPE_SPD + flpScore * 0.025);
  flpPipes = flpPipes.filter(p => p.x + PIPE_W > -10);
  const last = flpPipes[flpPipes.length-1];
  if (!last || last.x < flpCanvas.width - interval) spawnPipe(flpCanvas.width + 20);

  flpPipes.forEach(p => {
    if (!p.passed && p.x + PIPE_W < flpBird.x) {
      p.passed = true; flpScore++; globalScore++; updateScore();
      spawnFoodParticles(flpBird.x, flpBird.y);
    }
  });

  for (const p of flpPipes) {
    if (flpBird.x + FLP_R*0.65 > p.x && flpBird.x - FLP_R*0.65 < p.x + PIPE_W) {
      if (flpBird.y - FLP_R < p.topH || flpBird.y + FLP_R > p.botY) {
        triggerFlpDeath(); return;
      }
    }
  }
};


// ─── AUDIO ENGINE ─────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, vol, type = 'sine', detune = 0) {
  if (!chromaticOn) return;
  try {
    const ac = getAudioCtx(), osc = ac.createOscillator(), env = ac.createGain();
    osc.connect(env); env.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq; osc.detune.value = detune;
    env.gain.setValueAtTime(0, ac.currentTime);
    env.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.005);
    env.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + dur + 0.01);
  } catch(e) {}
}
function soundHover() { playTone(2800, 0.09, 0.04); setTimeout(() => playTone(3400, 0.07, 0.025, 'sine', 12), 18); }

// ─── GAME GRID ────────────────────────────────────────────────────────────────
const gameGrid    = document.getElementById('game-grid');
const gameGridCtx = gameGrid.getContext('2d');
let gameGridT     = 0;
let gameGridRaf   = null;

function drawGameGrid() {
  gameGrid.width  = window.innerWidth;
  gameGrid.height = window.innerHeight;
  const W = gameGrid.width, H = gameGrid.height;
  gameGridCtx.clearRect(0, 0, W, H);
  gameGridT++;

  const gs = 36; // grid spacing

  // Sliding chromatic gradient — same technique as the chromatic wave
  const shift = (gameGridT * 0.5) % W;
  const grad  = gameGridCtx.createLinearGradient(-shift, 0, W * 2 - shift, 0);
  grad.addColorStop(0,    '#c8a97e');
  grad.addColorStop(0.25, '#a0c4d8');
  grad.addColorStop(0.50, '#c4aad0');
  grad.addColorStop(0.75, '#7ec8b4');
  grad.addColorStop(1.0,  '#c8a97e');

  // Breathing pulse on the alpha
  const pulse = 0.18 + 0.06 * Math.sin(gameGridT * 0.025);

  gameGridCtx.save();
  gameGridCtx.strokeStyle = grad;
  gameGridCtx.lineWidth   = 0.45;
  gameGridCtx.globalAlpha = pulse;
  gameGridCtx.shadowColor = '#a0c4d8';
  gameGridCtx.shadowBlur  = 0;

  gameGridCtx.beginPath();
  for (let x = 0; x <= W; x += gs) {
    gameGridCtx.moveTo(x, 0);
    gameGridCtx.lineTo(x, H);
  }
  for (let y = 0; y <= H; y += gs) {
    gameGridCtx.moveTo(0, y);
    gameGridCtx.lineTo(W, y);
  }
  gameGridCtx.stroke();
  gameGridCtx.restore();

  gameGridRaf = requestAnimationFrame(drawGameGrid);
}

function startGameGrid() {
  gameGridT = 0;
  drawGameGrid();
  setTimeout(() => document.body.classList.add('grid-ready'), 50);
}

function stopGameGrid() {
  document.body.classList.remove('grid-ready');
  cancelAnimationFrame(gameGridRaf);
  setTimeout(() => {
    gameGridCtx.clearRect(0, 0, gameGrid.width, gameGrid.height);
  }, 900);
}

// ─── LOADING RING ────────────────────────────────────────────────────────────────
// (orbsTimer kept for compat)
let orbsTimer = null;
const ringHandCanvas = document.getElementById('ring-hand-canvas');
let ringRaf  = null;
let ringT    = 0;

function animateRing() {
  ringT += 0.003;

  // ── B: scanning arm + sector grid ───────────────────────────────────────
  if (ringHandCanvas) {
    const size = ringHandCanvas.offsetWidth || 400;
    if (ringHandCanvas.width !== size) {
      ringHandCanvas.width  = size;
      ringHandCanvas.height = size;
    }
    const hCtx   = ringHandCanvas.getContext('2d');
    const cx     = size / 2, cy = size / 2;
    const rInner = size * 0.12;
    const rOuter = size * 0.44 + size * 0.012 * Math.sin(ringT * 1.1);
    const angle  = ringT * (Math.PI * 2 / 6) - Math.PI / 2;
    const SECTOR = Math.PI * 0.55;  // ~99° sector ahead of arm
    const GS     = Math.round(size * 0.052); // grid spacing

    hCtx.clearRect(0, 0, size, size);

    // ── Sector grid — cartesian lines clipped to the wedge ────────────────
    hCtx.save();

    // Clip to circular sector (wedge from arm forward)
    hCtx.beginPath();
    hCtx.moveTo(cx, cy);
    hCtx.arc(cx, cy, rOuter, angle - SECTOR, angle, false);
    hCtx.closePath();
    // Also clip to annular region (rInner < r < rOuter) by adding inner arc
    // Use composite: draw full wedge, then erase inner circle
    hCtx.clip();

    // Erase the inner disc
    hCtx.save();
    hCtx.globalCompositeOperation = 'destination-out';
    hCtx.beginPath();
    hCtx.arc(cx, cy, rInner, 0, Math.PI * 2);
    hCtx.fill();
    hCtx.restore();

    // Grid lines — horizontal
    hCtx.strokeStyle = '#000';
    hCtx.lineWidth   = 0.3;
    hCtx.lineCap     = 'butt';
    for (let gy = GS * Math.ceil((cy - rOuter) / GS); gy <= cy + rOuter; gy += GS) {
      // Fade: lines closer to arm edge = brighter
      const dy    = gy - cy;
      // Angular fade based on line's closest angle to arm
      // Use a uniform alpha — clean look, no fade
      hCtx.globalAlpha = 0.12;
      hCtx.beginPath();
      hCtx.moveTo(cx - rOuter, gy);
      hCtx.lineTo(cx + rOuter, gy);
      hCtx.stroke();
    }
    // Grid lines — vertical
    for (let gx = GS * Math.ceil((cx - rOuter) / GS); gx <= cx + rOuter; gx += GS) {
      hCtx.globalAlpha = 0.12;
      hCtx.beginPath();
      hCtx.moveTo(gx, cy - rOuter);
      hCtx.lineTo(gx, cy + rOuter);
      hCtx.stroke();
    }

    hCtx.restore();

    // ── Arm line — on top ─────────────────────────────────────────────────
    const x1 = cx + Math.cos(angle) * rInner;
    const y1 = cy + Math.sin(angle) * rInner;
    const x2 = cx + Math.cos(angle) * rOuter;
    const y2 = cy + Math.sin(angle) * rOuter;

    hCtx.save();
    hCtx.globalCompositeOperation = 'source-over';
    hCtx.strokeStyle = '#000';
    hCtx.lineWidth   = 0.8;
    hCtx.lineCap     = 'butt';
    hCtx.globalAlpha = 1.0;
    hCtx.shadowBlur  = 0;
    hCtx.beginPath();
    hCtx.moveTo(x1, y1);
    hCtx.lineTo(x2, y2);
    hCtx.stroke();
    hCtx.restore();
  }

  ringRaf = requestAnimationFrame(animateRing);
}
animateRing();

  }

  async function poll() {
    const p = await fetchPrice();
    if (p !== null) {
      current = p;
      const now = Date.now();
      prices.push({t: now, p});
      prices = prices.filter(x => now - x.t <= WINDOW);
      const pInt = Math.round(p); const pDec = Math.round((p - pInt)*100).toString().padStart(2,'0');
      priceEl.innerHTML = '$' + pInt.toLocaleString('en-US') + '<span style="font-size:20px;color:rgba(0,0,0,0.35)">.' + pDec + '</span>';
      // Delta
      if (prices.length > 1) { const d = ((p - prices[0].p)/prices[0].p*100); const s = d>=0?'+':''; document.getElementById('trade-delta').textContent = s+d.toFixed(3)+'%'; }
    }
    if (active) pollTimer = setTimeout(poll, prices.length < 3 ? 800 : 3000);
  }

  // ── Draw chart ───────────────────────────────────────────────────────
  function drawChart() {
    // Use clientWidth or fallback to container width
    const rawW = chartEl.parentElement ? chartEl.parentElement.clientWidth || 428 : 428;
    const rawH = 100;
    const dpr = window.devicePixelRatio || 1;
    chartEl.width  = rawW * dpr;
    chartEl.height = rawH * dpr;
    chartEl.style.width  = rawW + 'px';
    chartEl.style.height = rawH + 'px';
    cCtx.scale(dpr, dpr);
    const w = rawW, h = rawH;
    cCtx.clearRect(0, 0, w, h);

    // Grid
    cCtx.save();
    cCtx.strokeStyle = 'rgba(0,0,0,0.05)';
    cCtx.lineWidth = 0.5;
    cCtx.beginPath();
    for (let x = 0; x <= w; x += 40) { cCtx.moveTo(x, 0); cCtx.lineTo(x, h); }
    for (let y = 0; y <= h; y += 30) { cCtx.moveTo(0, y); cCtx.lineTo(w, y); }
    cCtx.stroke();
    cCtx.restore();

    if (prices.length < 2) return;

    const now  = Date.now();
    const ps   = prices.map(x => x.p);
    const minP = Math.min(...ps) * 0.9998;
    const maxP = Math.max(...ps) * 1.0002;
    const pY   = p  => h - ((p - minP) / (maxP - minP || 1)) * h * 0.85 - h * 0.075;
    const tX   = ts => ((ts - (now - WINDOW)) / WINDOW) * w;

    // Entry line
    if (betP !== null) {
      const ey = pY(betP);
      cCtx.save();
      cCtx.setLineDash([3, 5]);
      cCtx.strokeStyle = 'rgba(0,0,0,0.2)';
      cCtx.lineWidth = 0.5;
      cCtx.beginPath(); cCtx.moveTo(0, ey); cCtx.lineTo(w, ey); cCtx.stroke();
      cCtx.setLineDash([]);
      cCtx.font = '7px "Helvetica Neue",sans-serif';
      cCtx.fillStyle = 'rgba(0,0,0,0.35)';
      cCtx.fillText('ENTRY  $' + betP.toLocaleString('en-US',{maximumFractionDigits:0}), 4, ey - 4);
      cCtx.restore();
    }

    // Fill
    cCtx.save();
    const fillG = cCtx.createLinearGradient(0, 0, 0, h);
    fillG.addColorStop(0, 'rgba(160,196,216,0.12)');
    fillG.addColorStop(1, 'rgba(160,196,216,0.00)');
    cCtx.fillStyle = fillG;
    cCtx.beginPath();
    prices.forEach((x, i) => i === 0 ? cCtx.moveTo(tX(x.t), pY(x.p)) : cCtx.lineTo(tX(x.t), pY(x.p)));
    const lx = tX(prices[prices.length-1].t);
    cCtx.lineTo(lx, h); cCtx.lineTo(0, h); cCtx.closePath(); cCtx.fill();
    cCtx.restore();

    // Line
    const grad = cCtx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0, '#c8a97e'); grad.addColorStop(0.33, '#a0c4d8');
    grad.addColorStop(0.66, '#c4aad0'); grad.addColorStop(1, '#7ec8b4');
    cCtx.save();
    cCtx.strokeStyle = grad; cCtx.lineWidth = 1.2;
    cCtx.lineJoin = 'round'; cCtx.lineCap = 'round'; cCtx.globalAlpha = 0.85;
    cCtx.beginPath();
    prices.forEach((x, i) => i === 0 ? cCtx.moveTo(tX(x.t), pY(x.p)) : cCtx.lineTo(tX(x.t), pY(x.p)));
    cCtx.stroke(); cCtx.restore();

    // Live dot
    const lp = prices[prices.length-1];
    const ldx = tX(lp.t), ldy = pY(lp.p);
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.005);
    cCtx.save();
    cCtx.strokeStyle = 'rgba(160,196,216,0.4)';
    cCtx.lineWidth = 0.5; cCtx.globalAlpha = pulse * 0.4;
    cCtx.beginPath(); cCtx.arc(ldx, ldy, 5 + pulse * 3, 0, Math.PI*2); cCtx.stroke();
    cCtx.fillStyle = grad; cCtx.globalAlpha = 0.95;
    cCtx.beginPath(); cCtx.arc(ldx, ldy, 2.5, 0, Math.PI*2); cCtx.fill();
    cCtx.restore();
  }

  // ── Render loop ──────────────────────────────────────────────────────
  function loop() {
    if (!active) return;
    drawChart();

    // Timer
    if (betDir && !resolved) {
      const elapsed  = Date.now() - betT;
      const progress = Math.min(elapsed / DURATION, 1);
      const tb = document.getElementById('trade-timer-bar'); if(tb) tb.style.width = ((1-progress)*100).toFixed(1)+'%';
      const secs = Math.max(0, Math.ceil((DURATION - elapsed) / 1000));
      const ts = document.getElementById('trade-timer-secs'); if(ts) ts.textContent = secs+'S';
      if (elapsed >= DURATION) resolve();
    }

    rafId = requestAnimationFrame(loop);
  }

  // ── Bet ──────────────────────────────────────────────────────────────
  function placeBet(dir) {
    if (betDir || !current) return;
    betDir = dir; betP = current; betT = Date.now(); resolved = false;
    btnHigh.disabled = true; btnLow.disabled = true;
    resEl.classList.remove('visible'); resEl.textContent = '';
    const tb3=document.getElementById('trade-timer-bar'); if(tb3) tb3.style.width='100%';
    const ts60 = document.getElementById('trade-timer-secs'); if(ts60) ts60.textContent='60S';
    if (typeof soundEat !== 'undefined') soundEat();
    if (typeof haptic   !== 'undefined') haptic('score');
  }

  function resolve() {
    if (resolved) return;
    resolved = true;
    const won = (betDir === 'higher' && current > betP) || (betDir === 'lower' && current < betP);
    const diff = ((current - betP) / betP * 100);
    if (won) { wins++; streak++; if (typeof soundEat !== 'undefined') soundEat(); }
    else     { losses++; streak = 0; if (typeof soundDeath !== 'undefined') soundDeath(); }
    const sign = diff >= 0 ? '+' : '';
    resEl.textContent = (won ? '✦ CORRECT' : '✦ INCORRECT') + '   ' + sign + diff.toFixed(3) + '%';
    resEl.classList.add('visible');
    document.getElementById('t-wins').textContent   = wins;
    document.getElementById('t-losses').textContent = losses;
    document.getElementById('t-streak').textContent = streak > 0 ? (streak > 1 ? '✦ '+streak : ''+streak) : '—';
    const tb2=document.getElementById('trade-timer-bar'); if(tb2) tb2.style.width='0%';
    const ts2=document.getElementById('trade-timer-secs'); if(ts2) ts2.textContent='';
    clearTimeout(resTimer);
    resTimer = setTimeout(() => {
      betDir = null; betP = null; betT = null; resolved = false;
      resEl.classList.remove('visible');
      btnHigh.disabled = false; btnLow.disabled = false;
      const tb3=document.getElementById('trade-timer-bar'); if(tb3) tb3.style.width='100%';
    }, 3000);
  }

  btnHigh.addEventListener('click', () => placeBet('higher'));
  btnLow.addEventListener('click',  () => placeBet('lower'));

  // ── Open / close ─────────────────────────────────────────────────────
  function openTrade() {
    active = true;
    prices = []; current = null; betDir = null; betP = null; resolved = false;
    wins = 0; losses = 0; streak = 0;
    btnHigh.disabled = false; btnLow.disabled = false;
    resEl.classList.remove('visible'); resEl.textContent = '';
    document.getElementById('t-wins').textContent='0';
  document.getElementById('t-losses').textContent='0';
  document.getElementById('t-streak').textContent='—';
    priceEl.textContent = '—';
    const tb3=document.getElementById('trade-timer-bar'); if(tb3) tb3.style.width='100%';
    const ts2=document.getElementById('trade-timer-secs'); if(ts2) ts2.textContent='';
    document.body.classList.add('trade');
    poll();
    loop();
  }

  function closeTrade() {
    active = false;
    clearTimeout(pollTimer); clearTimeout(resTimer);
    cancelAnimationFrame(rafId);
    document.body.classList.remove('trade');
  }

  modeBtn.addEventListener('click', () => { if (!active) openTrade(); else closeTrade(); });
  closeBtn.addEventListener('click', closeTrade);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && active) closeTrade(); });
})();

</script>
